        .nome-loja {

        .rating-box { margin-bottom: 30px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 42px; color: #334155; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .star-btn.active { color: #facc15; transform: scale(1.2); }

        .botao {
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; font-size: 16px; font-weight: 800;
            border-radius: 20px; transition: 0.3s; border: none; cursor: pointer; text-decoration: none;
        }

        .google { 
            background: #facc15; color: #0f172a; 
            box-shadow: 0 10px 25px rgba(250, 204, 21, 0.4);
            animation: pulsar 1.8s infinite ease-in-out;
        }

        .google::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            animation: brilhoPassando 2.5s infinite;
        }

        @keyframes pulsar {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(250, 204, 21, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(250, 204, 21, 0.6); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(250, 204, 21, 0.4); }
        }

        @keyframes brilhoPassando {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .whatsapp { background: #22c55e; color: white; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3); }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px; color: white; padding: 15px; margin-bottom: 20px; font-family: inherit; resize: none; outline: none;
        }

        .hidden { display: none; }

        .footer { margin-top: 40px; font-size: 13px; color: #e2e8f0; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 25px; }
        .ssl-msg { font-weight: bold; color: #4ade80; margin-bottom: 8px; display: block; }
        .hero-msg { font-weight: bold; color: #f472b6; margin-bottom: 15px; font-size: 16px; min-height: 24px; }
        .footer a { color: #facc15; text-decoration: none; font-weight: 800; }
    </style>
</head>
