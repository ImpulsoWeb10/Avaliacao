<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie a Amor por Patinhas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* EFEITO GLASSMORPHISM (Nível Premium) */
        .container { 
            max-width: 400px; 
            width: 100%;
            padding: 40px 30px; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo-box { margin-bottom: 25px; position: relative; }
        .logo { 
            width: 110px; 
            height: 110px;
            object-fit: cover;
            border-radius: 50%; 
            border: 4px solid #f472b6; 
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
            transition: transform 0.5s ease;
        }
        .logo:hover { transform: rotate(10deg) scale(1.05); }
        
        .nome-loja { 
            font-family: 'Pacifico', cursive; 
            font-size: 30px; 
            color: #f472b6; 
            text-shadow: 0 4px 10px rgba(244, 114, 182, 0.2);
            margin-top: 10px;
        }

        h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 20px; }
        h2 { font-size: 22px; margin-bottom: 15px; font-weight: 700; color: #facc15; }
        p { font-size: 15px; margin-bottom: 30px; color: #94a3b8; line-height: 1.6; }

        /* ESTRELAS COM ANIMAÇÃO BOUNCE */
        .rating-box { margin-bottom: 30px; display: flex; justify-content: center; gap: 8px; }
        .star-btn {
            font-size: 42px;
            color: #334155;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .star-btn.active { 
            color: #facc15; 
            transform: scale(1.2);
            text-shadow: 0 0 20px rgba(250, 204, 21, 0.4); 
        }

        .botao {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 20px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .google { 
            background: #facc15; 
            color: #0f172a; 
            box-shadow: 0 10px 20px -5px rgba(250, 204, 21, 0.3);
        }
        .google:active { transform: scale(0.98); }

        .whatsapp { 
            background: #22c55e; 
            color: white; 
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.3);
        }

        textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            font-family: inherit;
            resize: none;
        }

        .hidden { display: none; }

        .footer { 
            margin-top: 40px; 
            font-size: 12px; 
            color: #475569; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            padding-top: 25px; 
        }
        .footer a { color: #facc15; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .footer a:hover { color: #f472b6; }
    </style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="amor-por-patinhas.png" class="logo" alt="Amor por Patinhas">
        <div class="nome-loja">Amor por Patinhas</div>
    </div>

    <h1>Seu Feedback Vale Muito</h1>
    <h2 id="titulo-dinamico">Como foi sua experiência? 🐾</h2>
    <p id="instrucao">Toque nas estrelas para avaliar nosso cuidado com seu melhor amigo.</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" data-value="1" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" data-value="2" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" data-value="3" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" data-value="4" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" data-value="5" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden">
        <a href="https://g.page/r/CS5Xk3_P3_i7EAE/review" target="_blank" class="botao google">
            <i class="fab fa-google"></i> POSTAR NO GOOGLE
        </a>
    </div>

    <div id="feedback-ruim" class="hidden">
        <textarea id="texto-melhoria" placeholder="Conte-nos o que houve para podermos melhorar..." rows="3"></textarea>
        <button onclick="enviarWhatsApp()" class="botao whatsapp">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <div>🔒 Ambiente Seguro & Criptografado</div>
        <div>Desenvolvido por <a href="https://impulsoweb10.com.br/" target="_blank">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    let notaSelecionada = 0;

    function avaliar(n) {
        notaSelecionada = n;
        const stars = document.querySelectorAll('.star-btn');
        const bom = document.getElementById('feedback-bom');
        const ruim = document.getElementById('feedback-ruim');
        const titulo = document.getElementById('titulo-dinamico');
        const instrucao = document.getElementById('instrucao');

        // Animação das estrelas
        stars.forEach((s, i) => {
            if (i < n) {
                setTimeout(() => s.classList.add('active'), i * 50);
            } else {
                s.classList.remove('active');
            }
        });

        instrucao.style.display = 'none';

        if (n >= 4) {
            titulo.innerText = "Isso é incrível! ✨";
            bom.classList.remove('hidden');
            ruim.classList.add('hidden');
            
            // Confetes Premium
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#f472b6', '#facc15', '#ffffff']
            });
        } else {
            titulo.innerText = "Queremos te ouvir! 💬";
            ruim.classList.remove('hidden');
            bom.classList.add('hidden');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        const telefone = "5511973051524"; 
        if (!texto) { alert("Por favor, descreva como podemos melhorar."); return; }
        const mensagem = encodeURIComponent(`Feedback Amor por Patinhas (${notaSelecionada} estrelas): ${texto}`);
        window.open(`https://wa.me/${telefone}?text=${mensagem}`, '_blank');
    }
</script>

</body>
</html>
