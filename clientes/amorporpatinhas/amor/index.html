<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ImpulsoWeb10 - Impulsione seu negócio</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0a2c4a,#0f5b8f);
    color:white;
    text-align:center;
}

.container{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.logo{
    width:90%;
    max-width:320px;
    margin-bottom:30px;
}

.frase{
    font-size:24px;
    font-weight:bold;
    line-height:1.4;
}

.sub{
    margin-top:15px;
    font-size:16px;
    opacity:0.9;
}

.botao{
    margin-top:35px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#ff7a00,#ffb000);
    color:white;
    font-weight:bold;
}

.botao:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<img src="impulsoweb10.png" class="logo">

<div class="frase">
Impulsione sua presença digital 🚀
</div>

<div class="sub">
Com a <b>ImpulsoWeb10</b>, seu negócio ganha mais visibilidade, mais clientes e muito mais resultados na internet.
</div>

<button class="botao">
QUERO CRESCER NA INTERNET
</button>

</div>

</body>
</html>
