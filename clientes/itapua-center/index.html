<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Avaliação Itapuã Center | Materiais de Construção</title>
    <meta name="description" content="Avalie o atendimento e os produtos da Itapuã Center Materiais de Construção.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px 25px; /* Reduzido levemente */
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* LOGO ORIGINAL */
        .logo { 
            width: 150px; height: 150px; object-fit: contain; padding: 10px;
            border-radius: 22px; border: 3px solid #facc15; 
            background: white; margin: 0 auto 20px;
            transition: all 0.4s ease;
        }

        /* LOGO RETANGULAR (CORTADA) - APLICADA VIA JS */
        .logo.compacta {
            height: 70px;
            width: 180px;
            padding: 5px 15px;
            margin-bottom: 10px;
        }

        h1 { font-size: 26px; margin-bottom: 5px; color: #fff; }
        h2 { font-size: 17px; color: #facc15; margin-bottom: 25px; font-weight: normal; }
        
        .rating-box { margin-bottom: 25px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.25); text-shadow: 0 0 20px rgba(250, 204, 21, 0.6); }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 50px;
            font-weight: 800; font-size: 15px; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer;
            position: relative; overflow: hidden;
            margin-bottom: 8px;
        }
        
        .google { background: #facc15; color: #000; animation: pulse 2s infinite; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; }
        .whatsapp { background: #22c55e; color: white; }

        .google::after, .instagram::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shine 3s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        @keyframes shine { to { left: 100%; } }

        /* IMAGEM DA FAMÍLIA */
        .img-resultado {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: block;
        }

        .hidden { display: none; }

        .footer { 
            margin-top: 20px; 
            font-size: 12px; 
            color: #ffffff; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 15px;
            line-height: 1.6;
        }
        
        .footer .slogan-final { 
            font-style: italic; color: #facc15; margin-bottom: 10px; 
            font-size: 15px; font-weight: 700; display: block;
        }

        .footer a { color: #22c55e; text-decoration: none; font-weight: 800; }
        textarea { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 15px; color: white; padding: 12px; margin-bottom: 10px; outline: none; resize: none; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <img src="itapua-center-materiais-de-construcao.png" id="main-logo" class="logo" alt="Itapuã Center Logo">

    <h1 id="titulo">Itapuã Center</h1>
    <h2 id="subtitulo">Materiais de Construção</h2>
    
    <p id="instrucao" style="margin-bottom: 20px;">Toque nas estrelas para avaliar nosso atendimento:</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden">
        <img src="itapua-center.jpg" class="img-resultado" alt="Itapuã Center Família">
        
        <p style="font-size: 16px; margin-bottom: 10px;">Ficamos felizes! 🎉</p>
        
        <a href="https://g.page/r/CWSPsbcmiCwZEBM/review/" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <a href="https://www.instagram.com/itapua_center?utm_source=qr&igsh=MW9vbDl1OGtsbGU4Yw==" target="_blank" class="botao instagram">
            <i class="fab fa-instagram"></i> NOS SIGA NO INSTAGRAM
        </a>
    </div>

    <div id="feedback-ruim" class="hidden">
        <p style="font-size: 17px; margin-bottom: 10px;">Pedimos desculpas... 😔</p>
        <textarea id="texto-melhoria" placeholder="O que podemos melhorar?"></textarea>
        <button onclick="enviarWhatsApp()" class="botao whatsapp">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <span class="slogan-final">"Alicerce forte se constrói com confiança."</span>
        <div>🔒 CONEXÃO PROTEGIDA | © 2026</div>
        <div>Desenvolvido por: <a href="https://impulsoweb10.com.br/" target="_blank">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    let notaSelecionada = 0;
    function avaliar(n) {
        notaSelecionada = n;
        const stars = document.querySelectorAll('.star-btn');
        const logo = document.getElementById('main-logo');
        const container = document.getElementById('main-container');
        
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        
        document.getElementById('instrucao').classList.add('hidden');
        
        // CORTA A LOGO E DIMINUI MARGENS QUANDO AVALIADO
        logo.classList.add('compacta');
        container.style.padding = "15px 25px";
        document.getElementById('titulo').style.fontSize = "20px";
        document.getElementById('subtitulo').style.marginBottom = "10px";

        if (n >= 4) {
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('feedback-ruim').classList.add('hidden');
            
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#facc15', '#22c55e', '#ffffff', '#ff0000', '#0000ff']
            });
        } else {
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        const telefone = "5511945320614"; 
        if (!texto) { alert("Por favor, conte-nos o que podemos melhorar."); return; }
        const msg = encodeURIComponent(`Feedback Itapuã Center (${notaSelecionada} estrelas): ${texto}`);
        window.open(`https://wa.me/${telefone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
