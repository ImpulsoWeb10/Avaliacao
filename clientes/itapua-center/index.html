<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Itapuã Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px;
        }
        .container {
            width: 95%; max-width: 400px;
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.15); text-align: center;
        }
        .logo-box {
            width: 140px; height: 140px; background: white; margin: 0 auto 15px;
            border-radius: 20px; border: 3px solid #facc15; overflow: hidden; transition: all 0.4s ease;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
        .logo-box.compacta { width: 200px; height: 65px; margin-bottom: 10px; }
        .logo-box.compacta img { object-fit: cover; padding: 5px; }

        h1 { font-size: 22px; margin-bottom: 2px; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 38px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }
        .img-resultado { width: 100%; height: 130px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; display: block; }
        
        .botao {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 15px; border-radius: 50px; font-weight: 800; font-size: 14px; text-decoration: none; margin-bottom: 8px;
        }
        .google { background: #facc15; color: #000; animation: pulse 2s infinite; }
        .whatsapp { background: #22c55e; color: white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); } 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); } }
        .hidden { display: none; }
        textarea { width: 100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); border-radius:10px; color:white; padding:10px; margin-bottom:8px; outline:none; resize:none; }

        /* RODAPÉ VENDEDOR */
        .footer { margin-top: 25px; padding-top: 15px; font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1); }
        .cta-vendas { display: block; margin-bottom: 12px; font-size: 12px; color: #e2e8f0; line-height: 1.4; }
        .cta-vendas a { color: #38bdf8; text-decoration: none; font-weight: 700; border-bottom: 1px solid #38bdf8; }
        .footer .dev-link { color: #facc15; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo-box" id="logo-container">
        <img src="itapua-center-materiais-de-construcao.png" alt="Logo">
    </div>
    <h1 id="txt-h1">Itapuã Center</h1>
    <h2 id="txt-h2">Materiais de Construção</h2>
    <div id="instrucao">
        <p style="margin-bottom: 10px; font-size: 14px;">Toque nas estrelas para avaliar:</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
        </div>
    </div>
    <div id="feedback-bom" class="hidden">
        <img src="itapua-center.jpg" class="img-resultado" alt="Casa">
        <a href="https://g.page/r/CWSPsbcmiCwZEBM/review/" target="_blank" class="botao google">AVALIAR NO GOOGLE</a>
    </div>
    <div id="feedback-ruim" class="hidden">
        <textarea id="texto-melhoria" rows="3" placeholder="Por gentileza, o que ocorreu para melhorarmos?"></textarea>
        <button onclick="enviarWhatsApp()" class="botao whatsapp">FALAR COM O GERENTE</button>
    </div>
    <div class="footer">
        <span class="cta-vendas">
            Gostou desse sistema? Tenha um link personalizado para sua empresa. 
            <a href="https://wa.me/5511954950044?text=Olá, vi o link da Itapuã Center e quero um para minha empresa!" target="_blank">Clique aqui</a>
        </span>
        <div>Desenvolvido por: <a href="https://impulsoweb10.com.br/" target="_blank" class="dev-link">ImpulsoWeb10</a></div>
    </div>
</div>
<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        document.getElementById('instrucao').classList.add('hidden');
        document.getElementById('logo-container').classList.add('compacta');
        if (n >= 4) {
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('feedback-ruim').classList.add('hidden');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
        } else {
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }
    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        if (!texto) { alert("Por favor, digite sua mensagem."); return; }
        window.open(`https://wa.me/5511945320614?text=Feedback: ${encodeURIComponent(texto)}`, '_blank');
    }
</script>
</body>
</html>
