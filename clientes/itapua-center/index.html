<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Itapuã Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            width: 95%; /* Aproveita quase toda a largura da tela */
            max-width: 420px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 25px 20px; /* Reduzido para compactar */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        /* LOGO ORIGINAL (PRIMEIRA PARTE) */
        .logo-original { 
            width: 140px; height: 140px; object-fit: contain; padding: 10px;
            border-radius: 20px; border: 3px solid #facc15; 
            background: white; margin: 0 auto 15px;
            display: block;
        }

        /* LOGO RETANGULAR (SEGUNDA PARTE) - CORTADA SEM ACHATAR */
        .logo-retangular {
            display: none; /* Oculta na primeira parte */
            width: 100%;
            max-width: 190px;
            height: 60px; /* Mais baixo */
            object-fit: cover; /* Faz o corte sem distorcer */
            border-radius: 12px;
            border: 2px solid #facc15;
            background: white;
            margin: 0 auto 10px;
        }

        h1 { font-size: 22px; margin-bottom: 2px; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 6px; }
        .star-btn { font-size: 35px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* IMAGEM DA FAMÍLIA (RETANGULAR E COMPACTA) */
        .img-resultado {
            width: 100%;
            height: 120px; /* Fixado para caber na tela */
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: block;
        }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 50px;
            font-weight: 800; font-size: 14px; text-decoration: none;
            margin-bottom: 8px; position: relative; overflow: hidden;
        }
        
        .google { background: #facc15; color: #000; animation: pulse 2s infinite; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; }
        .whatsapp { background: #22c55e; color: white; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }

        .hidden { display: none; }

        .footer { 
            margin-top: 20px; padding-top: 15px;
            font-size: 11px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .footer a { color: #22c55e; text-decoration: none; font-weight: 700; }
        .slogan-final { color: #facc15; font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <img src="itapua-center-materiais-de-construcao.png" id="logo-q" class="logo-original" alt="Logo Quadrada">
    
    <img src="itapua-center-materiais-de-construcao.png" id="logo-r" class="logo-retangular" alt="Logo Retangular">

    <h1>Itapuã Center</h1>
    <h2>Materiais de Construção</h2>
    
    <div id="instrucao">
        <p style="margin-bottom: 10px; font-size: 14px;">Avalie nosso atendimento:</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
            <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
        </div>
    </div>

    <div id="feedback-bom" class="hidden">
        <img src="itapua-center.jpg" class="img-resultado" alt="Família Itapuã">
        
        <p style="font-size: 15px; margin-bottom: 8px;">Ficamos muito felizes! 🎉</p>
        
        <a href="https://g.page/r/CWSPsbcmiCwZEBM/review/" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <a href="https://www.instagram.com/itapuacenter" target="_blank" class="botao instagram">
            <i class="fab fa-instagram"></i> NOS SIGA NO INSTAGRAM
        </a>
    </div>

    <div id="feedback-ruim" class="hidden">
        <textarea id="texto-melhoria" rows="3" style="width:100%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); border-radius:10px; color:white; padding:10px; margin-bottom:8px; outline:none; resize:none;" placeholder="Como podemos melhorar?"></textarea>
        <button onclick="enviarWhatsApp()" class="botao whatsapp">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <span class="slogan-final">"Alicerce forte se constrói com confiança."</span>
        <div>Desenvolvido por: <a href="https://impulsoweb10.com.br/" target="_blank">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        
        document.getElementById('instrucao').classList.add('hidden');
        
        if (n >= 4) {
            // TROCA A LOGO: OCULTA A QUADRADA E MOSTRA A RETANGULAR
            document.getElementById('logo-q').style.display = 'none';
            document.getElementById('logo-r').style.display = 'block';
            
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('feedback-ruim').classList.add('hidden');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
        } else {
            document.getElementById('logo-q').style.display = 'none';
            document.getElementById('logo-r').style.display = 'block';
            
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        if (!texto) { alert("Por favor, digite sua mensagem."); return; }
        window.open(`https://wa.me/5511945320614?text=Feedback: ${encodeURIComponent(texto)}`, '_blank');
    }
</script>

</body>
</html>
