<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Itapuã Center | Materiais de Construção</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 25px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .logo { 
            width: 110px; height: 110px; object-fit: contain; padding: 8px;
            border-radius: 18px; border: 2px solid #facc15; 
            background: white; margin: 0 auto 15px;
        }

        h1 { font-size: 22px; margin-bottom: 4px; color: #fff; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        /* ESTRELAS MENORES */
        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 6px; }
        .star-btn { font-size: 32px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.15); text-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }

        /* IMAGEM RETANGULAR E COMPACTA */
        .img-familia {
            width: 100%;
            max-height: 160px; /* Limita a altura para não empurrar os botões */
            object-fit: cover; /* Faz a imagem preencher o retângulo sem distorcer */
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: block;
        }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; border-radius: 50px;
            font-weight: 800; font-size: 14px; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer;
            position: relative; overflow: hidden;
            margin-bottom: 8px;
        }
        
        .google { background: #facc15; color: #000; animation: pulse 2s infinite; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; }

        .google::after, .instagram::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        .whatsapp { background: #22c55e; color: white; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); }
            100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        @keyframes shine { to { left: 100%; } }

        .hidden { display: none; }

        .footer { 
            margin-top: 25px; font-size: 12px; color: #ffffff; 
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }
        .footer .slogan-final { font-style: italic; color: #facc15; font-size: 15px; margin-bottom: 10px; display: block; }
        .footer a { color: #22c55e; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <img src="itapua-center-materiais-de-construcao.png" class="logo" alt="Itapuã Center Logo">

    <h1>Itapuã Center</h1>
    <h2>Materiais de Construção</h2>
    
    <p id="instrucao" style="font-size: 14px; margin-bottom: 15px;">Avalie nosso atendimento:</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden">
        <img src="https://images.unsplash.com/photo-1593335851329-3adb597d0321?q=80&w=800&auto=format&fit=crop" class="img-familia" alt="Família e Casa Feliz">
        
        <p style="font-size: 16px; margin-bottom: 10px;">Ficamos muito felizes! 🎉</p>
        
        <a href="https://g.page/r/CWSPsbcmiCwZEBM/review/" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <a href="https://www.instagram.com/itapua_center?utm_source=qr&igsh=MW9vbDl1OGtsbGU4Yw==" target="_blank" class="botao instagram">
            <i class="fab fa-instagram"></i> NOS SIGA NO INSTAGRAM
        </a>
    </div>

    <div id="feedback-ruim" class="hidden">
        <p style="margin-bottom: 10px;">Como podemos melhorar? 😔</p>
        <textarea id="texto-melhoria" rows="3" placeholder="Sua opinião é importante..."></textarea>
        <button onclick="enviarWhatsApp()" class="botao whatsapp">
            <i class="fab fa-whatsapp"></i> FALAR COM O GERENTE
        </button>
    </div>

    <div class="footer">
        <span class="slogan-final">"Alicerce forte se constrói com confiança."</span>
        <div>© 2026 | <a href="https://impulsoweb10.com.br/" target="_blank">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        document.getElementById('instrucao').classList.add('hidden');
        
        if (n >= 4) {
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('feedback-ruim').classList.add('hidden');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }

    function enviarWhatsApp() {
        const texto = document.getElementById('texto-melhoria').value;
        if (!texto) { alert("Por favor, digite sua mensagem."); return; }
        window.open(`https://wa.me/5511945320614?text=Feedback Itapuã Center: ${encodeURIComponent(texto)}`, '_blank');
    }
</script>

</body>
</html>
