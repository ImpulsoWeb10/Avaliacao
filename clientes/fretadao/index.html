<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Fretadão | Sua Viagem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); padding: 30px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; }
        
        .logo-box { width: 100%; margin-bottom: 20px; transition: 0.5s ease; }
        .logo { width: 100%; max-width: 280px; height: auto; border-radius: 25px; border: 4px solid #facc15; background: white; transition: 0.5s; }
        .logo-small .logo { max-width: 196px; } /* Redução de 30% conforme pedido */

        #carinha { font-size: 55px; display: block; margin-bottom: 10px; transition: 0.3s; }
        h2 { font-size: 16px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 45px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        textarea { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 15px; color: white; padding: 15px; margin-bottom: 15px; outline: none; resize: none; font-family: inherit; font-size: 14px; height: 90px; }

        .img-premium { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.2); display: none; animation: fadeIn 0.8s ease; }

        .botao { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; border-radius: 50px; font-weight: 800; font-size: 16px; text-decoration: none; border: none; cursor: pointer; margin-bottom: 10px; }
        .google { background: #facc15; color: #000; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3); }
        .whatsapp { background: #22c55e; color: white; }

        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .slogan-dinamico { font-style: italic; color: #facc15; font-size: 14px; display: block; margin-bottom: 15px; min-height: 40px; }
        
        /* SELOS DE SEGURANÇA PROFISSIONAIS */
        .selos-seguranca { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; opacity: 0.8; }
        .selo-item { font-size: 10px; color: #cbd5e1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .selo-item i { font-size: 18px; color: #94a3b8; } /* Cor metálica profissional */

        .cta-impulso { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 8px; }
        .cta-impulso a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        .dev { font-size: 11px; color: #64748b; }
        .dev b { color: #22c55e; }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box" id="logo-wrap">
        <img src="fretadao.png" class="logo" alt="Fretadão">
    </div>

    <span id="carinha">🚐</span>
    <h2 id="subtitulo">Sua avaliação é muito importante para nós!</h2>
    
    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="area-comentario" class="hidden">
        <textarea id="feedback-texto" placeholder="Em que podemos melhorar para te atender melhor?"></textarea>
    </div>

    <div id="bloco-positivo" class="hidden">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/8719727405889128916_0" class="img-premium" id="img-viagem">
        <a href="LINK_DO_GOOGLE" class="botao google"><i class="fab fa-google"></i> AVALIAR NO GOOGLE</a>
    </div>

    <div id="bloco-negativo" class="hidden">
        <button onclick="enviarGerente()" class="botao whatsapp"><i class="fab fa-whatsapp"></i> ENVIAR AO GERENTE</button>
    </div>

    <div class="footer">
        <span id="slogan-seo" class="slogan-dinamico">"Fretadão: Conectando pessoas com segurança e conforto."</span>
        
        <div class="selos-seguranca">
            <div class="selo-item"><i class="fas fa-user-shield"></i> AMBIENTE SEGURO</div>
            <div class="selo-item"><i class="fas fa-certificate"></i> SSL CRIPTOGRAFADO</div>
        </div>

        <span class="cta-impulso">
            Gostaria de um link personalizado como este? 
            <a href="https://www.impulsoweb10.com.br" target="_blank">Saiba mais</a>
        </span>
        <div class="dev">Desenvolvido por: <b>ImpulsoWeb10</b></div>
    </div>
</div>

<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        const carinha = document.getElementById('carinha');
        const slogan = document.getElementById('slogan-seo');
        const areaTexto = document.getElementById('area-comentario');
        
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        document.getElementById('logo-wrap').classList.add('logo-small');

        // Lógica de Carinhas e Textos
        if (n <= 3) {
            carinha.innerText = n === 1 ? "☹️" : (n === 2 ? "😐" : "🙂");
            slogan.innerText = "Trabalhamos para melhorar. Seu feedback é essencial para o Fretadão.";
            areaTexto.classList.remove('hidden'); // MOSTRA CAIXA DE TEXTO
            document.getElementById('bloco-positivo').classList.add('hidden');
            document.getElementById('bloco-negativo').classList.remove('hidden');
        } else {
            carinha.innerText = "😍";
            slogan.innerText = "Excelência em transporte. O Fretadão agradece a sua confiança!";
            areaTexto.classList.add('hidden'); // SOME A CAIXA DE TEXTO (4 e 5 estrelas)
            document.getElementById('bloco-positivo').classList.remove('hidden');
            document.getElementById('bloco-negativo').classList.add('hidden');
            document.getElementById('img-viagem').style.display = "block";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function enviarGerente() {
        const msg = document.getElementById('feedback-texto').value;
        window.open(`https://wa.me/5511972082305?text=Feedback Fretadão: ${msg}`, '_blank');
    }
</script>

</body>
</html>
