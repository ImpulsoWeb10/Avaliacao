<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Avaliação Fretadão | Sua Viagem em Primeiro Lugar</title>
    <meta name="description" content="Avalie sua experiência com o Fretadão. Sua segurança e conforto são nossa prioridade no transporte de passageiros.">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* LOGO QUE DIMINUI */
        .logo-box {
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo { 
            width: 100%;
            max-width: 320px; /* Bem grande no início */
            height: auto;
            border-radius: 25px;
            border: 4px solid #facc15; 
            background: white;
            transition: all 0.6s ease;
        }

        .logo-small .logo {
            max-width: 120px; /* Encolhe para dar espaço */
            margin-bottom: 10px;
        }

        h1 { font-size: 26px; margin-bottom: 5px; color: #fff; }
        h2 { font-size: 16px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        .rating-box { margin-bottom: 25px; display: flex; justify-content: center; gap: 10px; }
        .star-btn { font-size: 45px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.2); }

        /* IMAGEM DO ÔNIBUS NA ESTRADA */
        .img-estrada {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none; /* Escondida inicialmente */
            animation: fadeIn 0.8s ease;
        }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; border-radius: 50px;
            font-weight: 800; font-size: 16px; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer;
            margin-bottom: 12px;
        }
        
        .google { background: #facc15; color: #000; }
        .whatsapp-gerente { background: #22c55e; color: white; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .slogan { font-style: italic; color: #facc15; font-size: 16px; font-weight: 700; display: block; margin-bottom: 15px; }
        .dev { font-size: 12px; color: #94a3b8; }
        .dev a { color: #22c55e; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box" id="logo-wrap">
        <img src="logo-fretadao.png" class="logo" alt="Fretadão">
    </div>

    <h1>Fretadão</h1>
    <h2 id="subtitulo">Transporte de Passageiros</h2>
    
    <p id="instrucao" style="margin-bottom: 20px;">Toque nas estrelas para avaliar sua viagem:</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-bom" class="hidden">
        <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800" class="img-estrada" id="foto-viagem" alt="Viagem Segura">
        
        <a href="https://g.page/r/SEU_LINK_AQUI/review" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <a href="https://instagram.com/fretadao" target="_blank" class="botao instagram">
            <i class="fab fa-instagram"></i> SIGA NOSSA JORNADA
        </a>
    </div>

    <div id="feedback-ruim" class="hidden">
        <p style="margin-bottom: 15px;">Sentimos muito. Vamos resolver agora mesmo!</p>
        <a href="https://wa.me/5511972082305?text=Olá, tive um problema na minha viagem com o Fretadão e gostaria de falar com o gerente." class="botao whatsapp-gerente">
            <i class="fab fa-whatsapp"></i> FALAR COM GERENTE
        </a>
    </div>

    <div class="footer">
        <span class="slogan">"Transportando sonhos e conectando destinos com a segurança que você merece."</span>
        <div class="dev">Desenvolvido por: <a href="https://impulsoweb10.com.br/">ImpulsoWeb10</a></div>
    </div>
</div>

<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        
        // Efeito de encolher o logo e subtitulo
        document.getElementById('logo-wrap').classList.add('logo-small');
        document.getElementById('instrucao').classList.add('hidden');
        document.getElementById('subtitulo').style.fontSize = "14px";

        if (n >= 4) {
            document.getElementById('feedback-bom').classList.remove('hidden');
            document.getElementById('foto-viagem').style.display = 'block';
            document.getElementById('feedback-ruim').classList.add('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById('feedback-ruim').classList.remove('hidden');
            document.getElementById('feedback-bom').classList.add('hidden');
        }
    }
</script>

</body>
</html>
