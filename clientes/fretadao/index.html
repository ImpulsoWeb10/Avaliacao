<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Fretadão | Sua Viagem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(12px); padding: 30px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); text-align: center; }
        
        .logo-box { width: 100%; margin-bottom: 20px; transition: 0.5s ease; }
        .logo { width: 100%; max-width: 280px; height: auto; border-radius: 25px; border: 4px solid #facc15; background: white; transition: 0.5s; }
        .logo-small .logo { max-width: 196px; }

        #carinha { font-size: 55px; display: block; margin-bottom: 10px; transition: 0.3s; }
        h2 { font-size: 16px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 45px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        textarea { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 15px; color: white; padding: 15px; margin-bottom: 15px; outline: none; resize: none; font-size: 14px; height: 90px; }

        .img-premium { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 2px solid #facc15; display: none; animation: fadeIn 0.8s ease; }

        /* BOTÃO GOOGLE COM BRILHO E PULSO */
        .google { 
            background: #facc15; color: #000; 
            font-weight: 800; font-size: 16px;
            padding: 18px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; position: relative; overflow: hidden;
            animation: pulse 2s infinite; 
        }
        .google::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shine 3s infinite;
        }

        .whatsapp { background: #22c55e; color: white; padding: 18px; border-radius: 50px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; border: none; cursor: pointer; width: 100%; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); } 100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); } }
        @keyframes shine { to { left: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .slogan-dinamico { font-style: italic; color: #facc15; font-size: 14px; display: block; margin-bottom: 15px; min-height: 45px; transition: 0.3s; }
        
        .selos-seguranca { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .selo-item { font-size: 10px; color: #94a3b8; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .selo-item i { font-size: 20px; color: #64748b; }

        .cta-impulso { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 8px; }
        .cta-impulso a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        .dev { font-size: 11px; color: #64748b; }
        .dev b { color: #22c55e; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box" id="logo-wrap">
        <img src="fretadao.png" class="logo" alt="Fretadão">
    </div>

    <span id="carinha">🚐</span>
    <h2 id="subtitulo">Sua avaliação é fundamental!</h2>
    
    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="area-comentario" class="hidden">
        <textarea id="feedback-texto" placeholder="Como podemos melhorar para você?"></textarea>
    </div>

    <div id="bloco-positivo" class="hidden">
        <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=800" class="img-premium" id="img-viagem">
        <a href="LINK_DO_GOOGLE" class="google"><i class="fab fa-google"></i> AVALIAR NO GOOGLE</a>
    </div>

    <div id="bloco-negativo" class="hidden">
        <button onclick="enviarGerente()" class="whatsapp"><i class="fab fa-whatsapp"></i> FALAR COM GERENTE</button>
    </div>

    <div class="footer">
        <span id="slogan-seo" class="slogan-dinamico">"Fretadão: Segurança e pontualidade em transporte executivo."</span>
        
        <div class="selos-seguranca">
            <div class="selo-item"><i class="fas fa-shield-alt"></i> AMBIENTE SEGURO</div>
            <div class="selo-item"><i class="fas fa-user-lock"></i> SSL PROTEGIDO</div>
        </div>

        <span class="cta-impulso">
            Deseja um link personalizado para sua empresa? 
            <a href="https://www.impulsoweb10.com.br" target="_blank">Saiba mais aqui</a>
        </span>
        <div class="dev">Desenvolvido por: <b>ImpulsoWeb10</b></div>
    </div>
</div>

<script>
    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        const carinha = document.getElementById('carinha');
        const slogan = document.getElementById('slogan-seo');
        const img = document.getElementById('img-viagem');
        
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });
        document.getElementById('logo-wrap').classList.add('logo-small');

        // FRASES SEO POR ESTRELA
        const frasesSEO = {
            1: "Transporte com segurança é compromisso. Queremos entender o que falhou na sua viagem hoje.",
            2: "Fretamento de ônibus com qualidade exige evolução constante. Ajude-nos a melhorar nosso serviço.",
            3: "Sua parceria como passageiro é o que move o Fretadão rumo à excelência no transporte.",
            4: "Logística de pessoas com conforto e agilidade. Ficamos felizes que sua viagem foi positiva!",
            5: "O melhor fretamento executivo da região! Sua satisfação confirma nossa missão de transporte seguro."
        };
        slogan.innerText = frasesSEO[n];

        if (n <= 3) {
            carinha.innerText = n === 1 ? "☹️" : (n === 2 ? "😐" : "🙂");
            document.getElementById('area-comentario').classList.remove('hidden');
            document.getElementById('bloco-positivo').classList.add('hidden');
            document.getElementById('bloco-negativo').classList.remove('hidden');
            img.style.display = "none";
        } else {
            carinha.innerText = "😍";
            document.getElementById('area-comentario').classList.add('hidden');
            document.getElementById('bloco-positivo').classList.remove('hidden');
            document.getElementById('bloco-negativo').classList.add('hidden');
            img.style.display = "block";
            
            // SUPER CONFETE
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 } });
            setTimeout(() => { confetti({ particleCount: 100, spread: 120, origin: { x: 0.3, y: 0.5 } }); }, 200);
            setTimeout(() => { confetti({ particleCount: 100, spread: 120, origin: { x: 0.7, y: 0.5 } }); }, 400);
        }
    }

    function enviarGerente() {
        const msg = document.getElementById('feedback-texto').value;
        window.open(`https://wa.me/5511972082305?text=Feedback Fretadão: ${msg}`, '_blank');
    }
</script>

</body>
</html>
