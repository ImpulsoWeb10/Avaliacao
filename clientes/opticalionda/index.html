<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avalie nossa Qualidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo { 
            width: 160px; height: auto; padding: 5px;
            border-radius: 22px; border: 3px solid #facc15; 
            background: white; margin: 0 auto 15px;
            display: block;
        }

        h1 { font-size: 24px; margin-bottom: 2px; color: #fff; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; margin-bottom: 15px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* MENSAGEM DE GRATIDÃO INICIAL */
        #fase-gratidao { font-size: 18px; padding: 20px; animation: fadeIn 0.5s; }

        /* SEGUNDA FASE (BOTÕES E TEXTAREA) */
        #fase-final { animation: fadeIn 0.8s; }

        .botao {
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 50px;
            font-weight: 800; font-size: 15px; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer; margin-bottom: 15px;
        }

        /* BOTÃO GOOGLE PULSANTE COM BRILHO */
        .google { background: #facc15; color: #000; animation: pulsarBtn 1.5s infinite; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4); }
        .google::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg); animation: brilhoPassando 3s infinite;
        }

        .btn-enviar { background: #22c55e; color: white; margin-top: 5px; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 15px;
            color: white; padding: 12px; margin-bottom: 10px;
            resize: none; outline: none; font-family: inherit;
        }

        /* IMAGEM QUE CRESCE */
        .img-oculos {
            width: 120px; margin: 15px auto 0;
            display: block; opacity: 0; transform: scale(0);
            animation: crescerImagem 1.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes crescerImagem { to { opacity: 1; transform: scale(1); } }
        @keyframes pulsarBtn { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes brilhoPassando { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hidden { display: none; }
        .footer { margin-top: 25px; font-size: 11px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .marca-footer { color: #22c55e; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-optica-lionda.png" class="logo" id="logo-header">

    <h1>Óptica Lionda</h1>
    <h2>Excelência em Saúde Visual</h2>
    
    <div id="sessao-estrelas">
        <p id="instrucao">Como foi sua experiência hoje?</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="iniciarFluxo(1)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo(2)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo(3)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo(4)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo(5)"></i>
        </div>
    </div>

    <div id="fase-gratidao" class="hidden">
        <h2 style="font-size: 22px; color: #fff;">Gratidão! ❤️</h2>
        <p>Por favor, para nos avaliar clique no Botão do Google, ou se preferir deixe uma mensagem abaixo.</p>
    </div>

    <div id="fase-final" class="hidden">
        <a href="https://search.google.com/local/writereview?placeid=SEU_ID_AQUI" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <textarea id="texto-msg" rows="3" placeholder="Deixe um elogio ou crítica..."></textarea>
        
        <button onclick="enviarGerente()" class="botao btn-enviar">
            <i class="fas fa-paper-plane"></i> ENVIAR PARA GERENTE
        </button>

        <img src="casal-oculos.png" class="img-oculos">
    </div>

    <div class="footer">
        <b>📍 R. Joaquim Caetano - Parque Piratininga</b><br>
        📞 Telefone: (11) 97131-9233
        <div style="margin-top: 15px; opacity: 0.8;">
            © 2026 | <a href="#" class="marca-footer">ImpulsoWeb10</a>
        </div>
    </div>
</div>

<script>
    let notaDada = 0;

    function iniciarFluxo(n) {
        notaDada = n;
        
        // Efeito de Confete
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });

        // Esconde estrelas e mostra Gratidão
        document.getElementById('sessao-estrelas').classList.add('hidden');
        document.getElementById('fase-gratidao').classList.remove('hidden');

        // Espera 4 segundos e muda para a fase final
        setTimeout(() => {
            document.getElementById('fase-gratidao').classList.add('hidden');
            document.getElementById('fase-final').classList.remove('hidden');
        }, 4000);
    }

    function enviarGerente() {
        const msg = document.getElementById('texto-msg').value;
        if(!msg) { alert("Por favor, escreva sua mensagem."); return; }
        
        const linkWa = `https://wa.me/5511971319233?text=Feedback (${notaDada} estrelas): ${msg}`;
        window.open(linkWa, '_blank');
    }
</script>

</body>
</html>
