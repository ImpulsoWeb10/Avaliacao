<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avalie nossa Qualidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo { 
            width: 160px; height: auto; padding: 5px;
            border-radius: 22px; border: 3px solid #facc15; 
            background: white; margin: 0 auto 15px;
            display: block; transition: 0.4s;
        }

        .logo-compacta { transform: scale(0.7); margin-bottom: -10px; }

        h1 { font-size: 24px; margin-bottom: 2px; color: #fff; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; min-height: 24px; margin-bottom: 10px; }

        /* ESTILO DA FRASE SEO */
        #frase-seo { 
            font-size: 14px; 
            font-weight: 600;
            color: #facc15; 
            min-height: 20px; 
            margin-bottom: 15px; 
            transition: 0.5s; 
            opacity: 0; 
            background: rgba(250, 204, 21, 0.1);
            padding: 8px;
            border-radius: 10px;
        }
        #frase-seo.show { opacity: 1; }

        .rating-box { margin-bottom: 15px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.15); }

        .img-comemorativa {
            width: 90%; height: 140px; object-fit: cover; border-radius: 20px;
            margin: 0 auto 15px; border: 2px solid #facc15;
            display: block; opacity: 0; transform: scale(0);
            animation: surgirEPulsar 2.5s forwards ease-out;
        }

        @keyframes surgirEPulsar {
            0% { opacity: 0; transform: scale(0); }
            40% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .botao {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; border-radius: 50px; font-weight: 800; 
            text-decoration: none; transition: 0.3s; border: none; cursor: pointer;
        }

        .google { background: #facc15; color: #000; padding: 16px; font-size: 15px; margin-bottom: 10px; animation: pulsarBtn 2s infinite; }
        .btn-abrir-msg { background: rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.2); margin-top: 5px; }

        .whatsapp { background: #22c55e; color: white; padding: 12px; font-size: 14px; margin-top: 10px; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px; color: white; padding: 10px; margin-top: 10px; resize: none; outline: none;
        }

        @keyframes pulsarBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .hidden { display: none !important; }

        .footer { margin-top: 25px; font-size: 11px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; line-height: 1.6; }
        .venda-link { color: #facc15; text-decoration: none; font-weight: 700; font-size: 11px; display: inline-block; margin: 10px 0; }
        .marca-footer { color: #22c55e; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-optica-lionda.png" class="logo" id="main-logo">

    <h1>Óptica Lionda</h1>
    <h2>Excelência em Saúde Visual</h2>
    
    <p id="instrucao">Como foi sua experiência hoje?</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <p id="frase-seo"></p>

    <div id="feedback-final" class="hidden">
        <img src="casal-oculos.png" class="img-comemorativa">
        
        <a id="btn-google-direct" href="https://search.google.com/local/writereview?placeid=ChIJJTBQmxljzpQRUCao9qStQcM" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <button id="btn-critica" class="botao btn-abrir-msg" onclick="abrirCaixaMsg()">
            Críticas ou elogios
        </button>

        <div id="caixa-gerente" class="hidden">
            <textarea id="texto-cliente" rows="2" placeholder="Escreva aqui para a gerente..."></textarea>
            <button onclick="enviarGerente()" class="botao whatsapp">
                <i class="fab fa-whatsapp"></i> ENVIAR PARA GERENTE
            </button>
        </div>
    </div>

    <div class="footer">
        <b>📍 R. Joaquim Caetano - Parque Piratininga</b><br>
        Itaquaquecetuba - SP, 08583-670<br>
        📞 Telefone: (11) 97131-9233<br>
        
        <a href="https://wa.me/5511954950044?text=Olá, quero um link personalizado para minha empresa!" target="_blank" class="venda-link">
            Deseja um link "assim" personalizado para sua empresa? Saiba mais
        </a><br>
        
        <div style="margin-top: 5px; opacity: 0.8;">
            © 2026 | Desenvolvido por <a href="https://wa.me/5511954950044" target="_blank" class="marca-footer">ImpulsoWeb10</a>
        </div>
    </div>
</div>

<script>
    const linkGoogleURL = "https://search.google.com/local/writereview?placeid=ChIJJTBQmxljzpQRUCao9qStQcM";
    let redirecionamentoAtivo = true;
    let timerGoogle;
    
    // FRASES ESPECÍFICAS PARA CADA ESTRELA (1 a 5)
    const frasesPorEstrela = {
        1: "Obrigado! Buscamos sempre evoluir nossa qualidade.",
        2: "Sua opinião nos ajuda a ser a melhor óptica da região.",
        3: "Atendimento e precisão são prioridades na Óptica Lionda.",
        4: "Ficamos felizes! Referência em lentes e armações em Itaquá.",
        5: "Incrível! Você acaba de avaliar a melhor Óptica de Itaquaquecetuba!"
    };

    function avaliar(n) {
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });

        // Mostra a frase correspondente à estrela clicada
        const fraseElement = document.getElementById('frase-seo');
        fraseElement.innerText = frasesPorEstrela[n];
        fraseElement.classList.add('show');

        document.getElementById('main-logo').classList.add('logo-compacta');
        document.getElementById('instrucao').classList.add('hidden');
        document.getElementById('feedback-final').classList.remove('hidden');

        confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });

        // Timer de 4 segundos para abrir o Google
        timerGoogle = setTimeout(() => {
            if (redirecionamentoAtivo) {
                window.open(linkGoogleURL, '_blank');
            }
        }, 4000);
    }

    function abrirCaixaMsg() {
        clearTimeout(timerGoogle);
        redirecionamentoAtivo = false;
        
        document.getElementById('caixa-gerente').classList.remove('hidden');
        document.getElementById('btn-critica').classList.add('hidden');
    }

    function enviarGerente() {
        const texto = document.getElementById('texto-cliente').value;
        if (!texto) return alert("Por favor, escreva sua mensagem.");
        
        window.open(`https://wa.me/5511954950044?text=Feedback Cliente Lionda: ${texto}`, '_blank');
        
        // Abre o Google após enviar o WhatsApp
        setTimeout(() => {
            window.open(linkGoogleURL, '_blank');
        }, 1000);
    }
</script>

</body>
</html>
