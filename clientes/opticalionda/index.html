<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avalie nossa Qualidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo { 
            width: 160px; 
            height: auto; 
            padding: 5px;
            border-radius: 22px;
            border: 3px solid #facc15; 
            background: white; 
            margin: 0 auto 15px;
            transition: 0.4s;
            display: block;
        }

        .logo-compacta { transform: scale(0.7); margin-bottom: -10px; }

        h1 { font-size: 24px; margin-bottom: 2px; color: #fff; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; min-height: 24px; margin-bottom: 15px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.15); }

        .img-comemorativa {
            width: 90%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 20px;
            margin: 0 auto 15px; 
            border: 2px solid #facc15;
            display: block;
            opacity: 0;
            transform: scale(0);
            animation: surgirEPulsar 2.5s forwards ease-out;
        }

        @keyframes surgirEPulsar {
            0% { opacity: 0; transform: scale(0); }
            40% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .botao {
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 50px;
            font-weight: 800; font-size: 15px; text-decoration: none;
            transition: 0.3s; border: none; cursor: pointer;
            margin-bottom: 10px;
        }

        .google { background: #facc15; color: #000; animation: pulsarBtn 2s infinite; }
        .google::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-20deg); animation: brilhoPassando 3s infinite;
        }

        @keyframes brilhoPassando { 0% { left: -150%; } 30% { left: 150%; } 100% { left: 150%; } }
        @keyframes pulsarBtn { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .hidden { display: none; }

        .footer { 
            margin-top: 25px; font-size: 11px; color: #cbd5e1; 
            border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-optica-lionda.png" class="logo" id="main-logo">

    <h1>Óptica Lionda</h1>
    <h2>Excelência em Saúde Visual</h2>
    
    <p id="instrucao">Como foi sua experiência hoje?</p>

    <div class="rating-box">
        <i class="fas fa-star star-btn" onclick="avaliar(1)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(2)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(3)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(4)"></i>
        <i class="fas fa-star star-btn" onclick="avaliar(5)"></i>
    </div>

    <div id="feedback-final" class="hidden">
        <img src="casal-oculos.png" class="img-comemorativa">
        <p style="font-size: 17px; margin-bottom: 15px;">Ficamos muito felizes! 🎉</p>
        <a href="https://www.google.com/maps/place/%C3%93tica+Lionda/@-23.4210109,-46.3495786,17z/data=!4m8!3m7!1s0x94ce7d399227cfdd:0xd2612d44d239ba82!8m2!3d-23.4210109!4d-46.3495786!9m1!1b1!16s%2Fg%2F11k6sxfh2t?entry=ttu&g_ep=EgoyMDI2MDMxNS4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="botao google">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>
    </div>

    <div class="footer">
        <b>📍 R. Joaquim Caetano - Parque Piratininga</b><br>
        📞 Telefone: (11) 97131-9233
        <div style="margin-top: 15px; opacity: 0.8;">
            © 2026 | Desenvolvido por ImpulsoWeb10
        </div>
    </div>
</div>

<script>
    function avaliar(n) {
        // Pinta as estrelas
        const stars = document.querySelectorAll('.star-btn');
        stars.forEach((s, i) => { i < n ? s.classList.add('active') : s.classList.remove('active'); });

        // Muda visual
        document.getElementById('main-logo').classList.add('logo-compacta');
        document.getElementById('instrucao').classList.add('hidden');
        
        // Mostra apenas o botão do Google e a foto
        document.getElementById('feedback-final').classList.remove('hidden');

        // Confete independente da nota
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
    }
</script>

</body>
</html>
