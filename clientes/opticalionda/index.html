<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avaliação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px;
        }
        .container {
            max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); padding: 30px 20px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15); text-align: center; position: relative;
        }
        .logo { width: 150px; background: white; padding: 5px; border-radius: 15px; border: 2px solid #facc15; margin-bottom: 15px; }
        .rating-box { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .star-btn { font-size: 45px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn:hover { color: #facc15; }

        /* MODAL ESTILOSO */
        #modal-gratidao {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); border-radius: 35px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px; text-align: center;
        }
        .purpurina {
            font-size: 32px; font-weight: 800;
            background: linear-gradient(90deg, #facc15, #fff, #ffd700, #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: brilho 2s linear infinite; margin-bottom: 15px;
        }
        @keyframes brilho { to { background-position: 200% center; } }

        /* SEGUNDA FASE - ELEMENTOS */
        .google-btn {
            background: #facc15; color: #000; padding: 15px; border-radius: 50px;
            font-weight: 800; text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin: 15px 0;
            animation: pulsar 1.5s infinite; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        .img-oculos-anim {
            width: 50px; border-radius: 15px; border: 2px solid #facc15; margin: 10px auto;
            display: block; opacity: 0; transform: scale(0.1);
            animation: crescerFoto 1.5s forwards ease-in-out;
        }

        @keyframes crescerFoto { to { opacity: 1; transform: scale(2.8); margin: 50px auto; } } /* Cresce bastante como no original */
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* CAMPO DE MSG E BOTAO MENORES */
        .area-feedback { width: 85%; margin: 0 auto; opacity: 0; animation: fadeIn 1s forwards 1s; }
        textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; padding: 8px; font-size: 13px; outline: none; margin-top: 10px;
        }
        .btn-gerente {
            width: 100%; padding: 10px; border-radius: 50px; background: #22c55e;
            color: white; font-weight: 700; border: none; margin-top: 8px; cursor: pointer; font-size: 13px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-optica-lionda.png" class="logo">
    
    <div id="tela-estrelas">
        <h1>Óptica Lionda</h1>
        <p style="color: #facc15; margin-top: 5px;">Como foi sua experiência hoje?</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="iniciarProcesso(1)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarProcesso(2)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarProcesso(3)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarProcesso(4)"></i>
            <i class="fas fa-star star-btn" onclick="iniciarProcesso(5)"></i>
        </div>
    </div>

    <div id="modal-gratidao" class="hidden">
        <h2 class="purpurina">"Gratidão!"</h2>
        <p style="font-size: 15px;">Aguarde um instante...</p>
    </div>

    <div id="segunda-fase" class="hidden">
        <a href="https://search.google.com/local/writereview?placeid=SEU_ID" target="_blank" class="google-btn">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <img src="casal-oculos.png" class="img-oculos-anim" id="foto-oculos">

        <div class="area-feedback">
            <textarea id="msg" rows="2" placeholder="Deixe um elogio ou crítica..."></textarea>
            <button onclick="enviarGerente()" class="btn-gerente">ENVIAR PARA GERENTE</button>
        </div>
    </div>
</div>

<script>
    function iniciarProcesso(n) {
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        // Abre o Modal com a frase
        document.getElementById('modal-gratidao').classList.remove('hidden');

        // Temporizador de 4 segundos para o Modal sumir e liberar a 2ª fase
        setTimeout(() => {
            document.getElementById('modal-gratidao').classList.add('hidden');
            document.getElementById('tela-estrelas').classList.add('hidden'); // Esconde estrelas de vez
            document.getElementById('segunda-fase').classList.remove('hidden');
        }, 4000);
    }

    function enviarGerente() {
        const texto = document.getElementById('msg').value;
        window.open(`https://wa.me/5511971319233?text=Feedback: ${texto}`, '_blank');
    }
</script>

</body>
</html>
