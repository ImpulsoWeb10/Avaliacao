<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avalie nossa Qualidade</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo { 
            width: 160px; height: auto; padding: 5px;
            border-radius: 22px; border: 3px solid #facc15; 
            background: white; margin: 0 auto 15px;
            display: block;
        }

        h1 { font-size: 24px; margin-bottom: 2px; color: #fff; }
        h2 { font-size: 15px; color: #facc15; margin-bottom: 20px; font-weight: normal; }
        #instrucao { font-size: 16px; font-weight: 700; color: #facc15; margin-bottom: 15px; }

        .rating-box { margin-bottom: 20px; display: flex; justify-content: center; gap: 8px; }
        .star-btn { font-size: 40px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn:hover { color: #facc15; transform: scale(1.1); }

        /* MODAL DE GRATIDÃO */
        #modal-gratidao {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        .purpurina {
            font-size: 35px; font-weight: 800;
            background: linear-gradient(90deg, #facc15, #fff, #ffd700, #facc15);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: brilhoPurpurina 1.5s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes brilhoPurpurina { to { background-position: 200% center; } }

        /* SEGUNDA FASE */
        .google-btn {
            background: #facc15; color: #000; padding: 15px; border-radius: 50px;
            font-weight: 800; text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 15px;
            animation: pulsar 1.5s infinite; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .img-oculos-fase2 {
            width: 50px; border-radius: 20px; border: 2px solid #facc15;
            margin: 10px auto; opacity: 0; transform: scale(0.1);
            animation: crescerFoto 1.2s forwards ease-out;
            display: block;
        }

        @keyframes crescerFoto { 
            to { opacity: 1; transform: scale(2.5); margin: 40px auto; } 
        }

        .area-feedback-menor {
            width: 90%; margin: 0 auto; opacity: 0;
            animation: fadeIn 1s forwards 0.8s;
        }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; padding: 10px; font-size: 13px; outline: none;
        }

        .btn-enviar-menor {
            width: 100%; padding: 10px; border-radius: 50px; background: #22c55e;
            color: white; font-weight: 700; border: none; margin-top: 8px; cursor: pointer; font-size: 13px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }

        .footer { margin-top: 20px; font-size: 10px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="fase-inicial">
        <img src="logo-optica-lionda.png" class="logo">
        <h1>Óptica Lionda</h1>
        <h2>Excelência em Saúde Visual</h2>
        <p id="instrucao">Como foi sua experiência hoje?</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="iniciarFluxo()"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo()"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFlow()"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo()"></i>
            <i class="fas fa-star star-btn" onclick="iniciarFluxo()"></i>
        </div>
    </div>

    <div id="modal-gratidao" class="hidden">
        <h2 class="purpurina">Gratidão!</h2>
        <p style="font-size: 14px; color: #facc15;">Sua opinião vale muito.</p>
    </div>

    <div id="fase-final" class="hidden">
        <a href="https://search.google.com/local/writereview?placeid=COLOCAR_SEU_ID" target="_blank" class="google-btn">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <img src="casal-oculos.png" class="img-oculos-fase2">

        <div class="area-feedback-menor">
            <p style="font-size: 12px; margin-bottom: 5px;">Ou deixe sua mensagem abaixo:</p>
            <textarea id="msg-cliente" rows="2" placeholder="Elogio ou crítica..."></textarea>
            <button onclick="enviarGerente()" class="btn-enviar-menor">ENVIAR PARA GERENTE</button>
        </div>
    </div>

    <div class="footer">
        <b>📍 R. Joaquim Caetano - Parque Piratininga</b><br>
        📞 (11) 97131-9233 | © 2026 ImpulsoWeb10
    </div>
</div>

<script>
    function iniciarFluxo() {
        // 1. Solta confete
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        // 2. Abre o Modal com Purpurina
        document.getElementById('modal-gratidao').classList.remove('hidden');

        // 3. Após 4 segundos, fecha tudo e abre a fase final
        setTimeout(() => {
            document.getElementById('fase-inicial').classList.add('hidden');
            document.getElementById('modal-gratidao').classList.add('hidden');
            document.getElementById('fase-final').classList.remove('hidden');
        }, 4000);
    }

    function enviarGerente() {
        const txt = document.getElementById('msg-cliente').value;
        if(!txt) return alert("Escreva sua mensagem.");
        window.open(`https://wa.me/5511971319233?text=Feedback Cliente: ${txt}`, '_blank');
    }
</script>

</body>
</html>
