<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Lionda | Avaliação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px;
        }
        .container {
            max-width: 420px; width: 100%; background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px); padding: 30px 20px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15); text-align: center;
        }
        .logo { width: 150px; background: white; padding: 5px; border-radius: 15px; border: 2px solid #facc15; margin-bottom: 15px; }
        
        /* ESTRELAS */
        .rating-box { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .star-btn { font-size: 45px; color: #475569; cursor: pointer; transition: 0.3s; }
        .star-btn.active { color: #facc15; transform: scale(1.1); }

        /* EFEITO PURPURINA NA FRASE */
        .purpurina {
            font-size: 28px; font-weight: 800; margin: 20px 0;
            background: linear-gradient(90deg, #facc15, #fff, #facc15, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: brilhoPurpurina 2s linear infinite;
        }
        @keyframes brilhoPurpurina { to { background-position: 200% center; } }

        /* ELEMENTOS COM ANIMAÇÃO DE SURGIMENTO */
        .fade-in { animation: fadeIn 0.8s forwards; opacity: 0; }
        .scale-up { animation: scaleUp 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; transform: scale(0); }

        /* BOTÃO GOOGLE PULSANTE */
        .google-btn {
            background: #facc15; color: #000; padding: 18px; border-radius: 50px;
            font-weight: 800; text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin: 20px 0;
            animation: pulsar 1.5s infinite; box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
        }

        /* FOTO DO ÓCULOS */
        .img-oculos { width: 130px; border-radius: 20px; border: 2px solid #facc15; margin: 15px auto; display: block; }

        textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            border-radius: 15px; color: white; padding: 12px; margin-top: 15px; outline: none;
        }
        .btn-envia {
            width: 100%; padding: 15px; border-radius: 50px; background: #22c55e;
            color: white; font-weight: 700; border: none; margin-top: 10px; cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulsar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo-optica-lionda.png" class="logo">
    
    <div id="etapa-1">
        <h1>Óptica Lionda</h1>
        <p style="color: #facc15; margin-top: 5px;">Como foi sua experiência hoje?</p>
        <div class="rating-box">
            <i class="fas fa-star star-btn" onclick="proximaFase(1)"></i>
            <i class="fas fa-star star-btn" onclick="proximaFase(2)"></i>
            <i class="fas fa-star star-btn" onclick="proximaFase(3)"></i>
            <i class="fas fa-star star-btn" onclick="proximaFase(4)"></i>
            <i class="fas fa-star star-btn" onclick="proximaFase(5)"></i>
        </div>
    </div>

    <div id="etapa-gratidao" class="hidden">
        <h2 class="purpurina">"Gratidão!"</h2>
        <p style="font-size: 14px; padding: 0 10px;">Por favor, para nos avaliar clique no Botão do Google, ou se preferir deixe uma msg de elogio ou critica no campo abaixo.</p>
    </div>

    <div id="etapa-google" class="hidden">
        <a href="https://search.google.com/local/writereview?placeid=SEU_ID_AQUI" target="_blank" class="google-btn">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>
    </div>

    <div id="etapa-foto" class="hidden">
        <img src="casal-oculos.png" class="img-oculos scale-up">
    </div>

    <div id="etapa-final" class="hidden">
        <textarea id="msg-cliente" rows="3" placeholder="Escreva aqui seu elogio ou crítica..."></textarea>
        <button onclick="enviar()" class="btn-envia">ENVIAR PARA GERENTE</button>
    </div>
</div>

<script>
    let nota = 0;

    function proximaFase(n) {
        nota = n;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });

        // Esconde primeira tela
        document.getElementById('etapa-1').classList.add('hidden');
        
        // 1. Mostra Gratidão (Imediato)
        document.getElementById('etapa-gratidao').classList.remove('hidden');

        // 2. Após 4 segundos, mostra o Botão Google
        setTimeout(() => {
            document.getElementById('etapa-google').classList.remove('hidden');
            document.getElementById('etapa-google').classList.add('fade-in');
        }, 4000);

        // 3. Após 5 segundos, mostra a Foto crescendo
        setTimeout(() => {
            document.getElementById('etapa-foto').classList.remove('hidden');
        }, 5000);

        // 4. Após 6 segundos, mostra o Campo de Mensagem
        setTimeout(() => {
            document.getElementById('etapa-final').classList.remove('hidden');
            document.getElementById('etapa-final').classList.add('fade-in');
        }, 6000);
    }

    function enviar() {
        const texto = document.getElementById('msg-cliente').value;
        window.open(`https://wa.me/5511971319233?text=Avaliação: ${nota} estrelas. Mensagem: ${texto}`, '_blank');
    }
</script>

</body>
</html>
