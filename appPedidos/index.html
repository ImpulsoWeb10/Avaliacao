<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tintas Qualy Quimy</title>

<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0f172a,#1e293b);
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

/* TOPO */
header {
text-align:center;
padding:10px;
}

header h2 {margin:0;}
header p {
margin:0;
font-size:13px;
opacity:0.7;
}

/* INPUTS */
.topo {
display:flex;
gap:5px;
padding:10px;
}

input {
flex:1;
padding:8px;
border-radius:8px;
border:none;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
flex:1;
overflow:auto;
}

.categoria {
background:#fff;
color:#000;
padding:18px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

/* MODAL */
.modal {
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#0008;
display:none;
justify-content:center;
align-items:center;
}

.modal-content {
background:#fff;
color:#000;
padding:20px;
width:90%;
border-radius:12px;
}

/* QTD */
.qtd-box {
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.qtd-box button {
width:40px;
}

/* BOTÕES */
button {
background:#25D366;
color:#fff;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:8px;
}

.voltar {background:#888;}

.total-bar {
position:fixed;
bottom:60px;
width:100%;
background:#111827;
text-align:center;
padding:12px;
font-size:18px;
}

footer {
position:fixed;
bottom:0;
width:100%;
background:#020617;
text-align:center;
padding:10px;
font-size:12px;
}

a {color:#25D366;}
</style>
</head>

<body>

<header>
<h2>Tintas Qualy Quimy</h2>
<p>Tintas e Texturas</p>
</header>

<div class="topo">
<input id="vendedor" placeholder="Vendedor">
<input id="cliente" placeholder="Cliente">
</div>

<div class="grid">
<div class="categoria" onclick="abrir('tintas')">🎨 Tintas</div>
<div class="categoria" onclick="abrir('massas')">🧱 Massas</div>
<div class="categoria" onclick="abrir('texturas')">🪵 Texturas</div>
<div class="categoria" onclick="abrir('prep')">🧴 Preparador</div>
</div>

<!-- MODAIS -->
<div class="modal" id="modalProdutos">
<div class="modal-content" id="lista"></div>
</div>

<div class="modal" id="modalQtd">
<div class="modal-content">
<h3 id="nome"></h3>
<p id="regras"></p>
<p id="melhor" style="color:green;"></p>

<div class="qtd-box">
<button onclick="menos()">-</button>
<input type="number" id="qtd" value="1" style="width:60px;text-align:center;">
<button onclick="mais()">+</button>
</div>

<button onclick="add()">Adicionar</button>
<button class="voltar" onclick="fechar('modalQtd')">Voltar</button>
</div>
</div>

<div class="modal" id="modalFinal">
<div class="modal-content">

<h3>Tintas Qualy Quimy</h3>
<p style="font-size:13px;">Tintas e Texturas</p>

<p id="infoCliente"></p>

<div id="resumo"></div>

<h4>Pagamento</h4>
<button onclick="pagamento('pix')">Pix / Espécie (-3%)</button>
<div>Cartão em até 3x sem juros</div>

<div id="totalFinal"></div>

<button onclick="enviar()">📲 WhatsApp</button>
<button onclick="imprimir()">🧾 PDF</button>

<button class="voltar" onclick="fechar('modalFinal')">Voltar</button>
</div>
</div>

<!-- TOTAL FIXO -->
<div class="total-bar">
💰 Total: R$ <span id="total">0.00</span>
</div>

<!-- RODAPÉ -->
<footer>
<p>🔒 Site seguro</p>
<p>
Desenvolvido por 
<a href="https://wa.me/5511954950044">ImpulsoWeb10</a>
</p>
</footer>

<script>
let produtos={
tintas:[{nome:"Tinta Econômica 18L",regras:[{min:20,preco:71.90},{min:1,preco:76.90}]}],
massas:[{nome:"Massa Corrida",regras:[{min:20,preco:31.90},{min:1,preco:33.90}]}],
texturas:[{nome:"Grafiato",regras:[{min:1,preco:55.90}]}],
prep:[{nome:"Selador",regras:[{min:1,preco:69.90}]}]
};

let carrinho=[], atual, total=0;

function abrir(cat){
let html="<h3>Produtos</h3>";
produtos[cat].forEach(p=>{
html+=`<div class="produto" onclick="sel('${cat}','${p.nome}')">${p.nome}</div>`;
});
html+=`<button class="voltar" onclick="fechar('modalProdutos')">Voltar</button>`;
lista.innerHTML=html;
modalProdutos.style.display="flex";
}

function sel(cat,nome){
atual=produtos[cat].find(p=>p.nome==nome);
modalProdutos.style.display="none";
modalQtd.style.display="flex";

regras.innerHTML=atual.regras.map(r=>`Acima de ${r.min} = R$ ${r.preco}`).join("<br>");
}

function mais(){qtd.value++;}
function menos(){if(qtd.value>1)qtd.value--;}

function add(){
let q=parseInt(qtd.value);
let regra=atual.regras.find(r=>q>=r.min);

if(regra.min>1){
melhor.innerText="Melhor preço aplicado!";
}else{
melhor.innerText="";
}

carrinho.push({nome:atual.nome,qtd:q,preco:regra.preco});
modalQtd.style.display="none";
calc();
}

function calc(){
total=0;
carrinho.forEach(i=>total+=i.qtd*i.preco);
document.getElementById("total").innerText=total.toFixed(2);
}

function finalizar(){
let vendedor=document.getElementById("vendedor").value;
let cliente=document.getElementById("cliente").value;

infoCliente.innerHTML=`Vendedor: ${vendedor}<br>Cliente: ${cliente}`;

let html="";
carrinho.forEach(i=>{
html+=`${i.nome} x${i.qtd}<br>`;
});
resumo.innerHTML=html;

totalFinal.innerHTML=`Total: R$ ${total.toFixed(2)}`;

modalFinal.style.display="flex";
}

function pagamento(tipo){
if(tipo=="pix"){
let f=total*0.97;
totalFinal.innerHTML+=`<br>Total com desconto: R$ ${f.toFixed(2)}`;
}else{
let p=(total/3).toFixed(2);
totalFinal.innerHTML+=`<br>3x de R$ ${p}`;
}
}

function enviar(){
window.open("https://wa.me/5511954950044");
}

function imprimir(){window.print();}

function fechar(id){document.getElementById(id).style.display="none";}
</script>

</body>
</html>
