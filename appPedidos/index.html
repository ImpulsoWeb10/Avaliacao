<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - Qualy Quimy</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="p-4 max-w-md mx-auto">
  <h1 class="text-xl font-bold text-center">Tintas Qualy Quimy</h1>
  <p class="text-center text-sm mb-4">Qualidade em Tintas e Complementos</p>

  <input id="vendedor" placeholder="Nome do vendedor" class="w-full p-2 mb-2 border rounded" />
  <input id="deposito" placeholder="Nome do depósito" class="w-full p-2 mb-4 border rounded" />

  <div id="categorias" class="grid grid-cols-2 gap-2"></div>

  <button onclick="fecharPedido()" class="w-full mt-4 bg-green-600 text-white p-3 rounded">Fechar Pedido</button>
</div>

<!-- Modal Produto -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white p-4 rounded w-80">
    <button onclick="fecharModal()">⬅ Voltar</button>
    <h2 id="produtoNome" class="font-bold my-2"></h2>
    <div class="flex items-center justify-center gap-4">
      <button onclick="menos()">-</button>
      <span id="qtd">1</span>
      <button onclick="mais()">+</button>
    </div>
    <select id="tipo" class="w-full mt-3 border p-2">
      <option value="varejo">Varejo</option>
      <option value="atacado">Atacado</option>
    </select>
    <button onclick="addCarrinho()" class="w-full mt-3 bg-blue-600 text-white p-2">Adicionar</button>
  </div>
</div>

<script>
const produtos = {
  "Tintas": [
    {nome:"Tinta 18L", preco:79.90, atacado:77.90}
  ],
  "Massas": [
    {nome:"Massa Corrida 25kg", preco:33.90, atacado:31.90}
  ]
};

let carrinho = [];
let produtoAtual = null;
let quantidade = 1;

const catDiv = document.getElementById("categorias");

Object.keys(produtos).forEach(cat => {
  let btn = document.createElement("button");
  btn.className = "bg-white p-3 rounded shadow";
  btn.innerText = cat;
  btn.onclick = () => abrirCategoria(cat);
  catDiv.appendChild(btn);
});

function abrirCategoria(cat){
  let lista = produtos[cat];
  lista.forEach(p => abrirModal(p));
}

function abrirModal(prod){
  produtoAtual = prod;
  quantidade = 1;
  document.getElementById("qtd").innerText = quantidade;
  document.getElementById("produtoNome").innerText = prod.nome;
  document.getElementById("modal").classList.remove("hidden");
}

function fecharModal(){
  document.getElementById("modal").classList.add("hidden");
}

function mais(){ quantidade++; document.getElementById("qtd").innerText = quantidade; }
function menos(){ if(quantidade>1) quantidade--; document.getElementById("qtd").innerText = quantidade; }

function addCarrinho(){
  let tipo = document.getElementById("tipo").value;
  let valor = tipo === "atacado" ? produtoAtual.atacado : produtoAtual.preco;

  carrinho.push({
    nome: produtoAtual.nome,
    qtd: quantidade,
    tipo,
    valor
  });

  fecharModal();
}

function fecharPedido(){
  let total = 0;
  let texto = "Pedido:%0A";

  carrinho.forEach(item => {
    let subtotal = item.qtd * item.valor;
    total += subtotal;
    texto += `${item.nome} - ${item.qtd}x R$${item.valor} = R$${subtotal}%0A`;
  });

  texto += `%0ATotal: R$${total}`;

  window.open(`https://wa.me/?text=${texto}`);
}
</script>

</body>
</html>
