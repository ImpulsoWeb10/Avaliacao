<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tintas Qualy Quimy - Pedidos</title>
<style>
body{font-family:Arial;background:#f2f4f7;margin:0}
header{background:#0d6efd;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
input,button{width:100%;padding:12px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{background:#0d6efd;color:#fff;border:none;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.card{background:#fff;padding:20px;border-radius:12px;text-align:center;font-weight:bold;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.total{margin-top:15px;font-size:18px;font-weight:bold}
.fixo{position:fixed;bottom:10px;right:10px;background:#28a745;padding:15px;border-radius:50px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-height:80%;overflow:auto}
.prod{padding:10px;border-bottom:1px solid #eee;cursor:pointer}
</style>
</head>
<body>

<header>
<h1>Tintas Qualy Quimy</h1>
<h2>Qualidade em Tintas e Complementos</h2>
</header>

<div class="container">
<input id="vendedor" placeholder="Nome do vendedor">
<input id="cliente" placeholder="Nome do cliente">
<input type="date" id="data">

<div class="grid">
<div class="card" onclick="abrir('Tintas')">Tintas</div>
<div class="card" onclick="abrir('Textura')">Textura</div>
<div class="card" onclick="abrir('Massas')">Massas</div>
<div class="card" onclick="abrir('Acabamento')">Acabamento</div>
<div class="card" onclick="abrir('Complementos')">Complementos</div>
</div>

<div class="total">Total: R$ <span id="total">0.00</span></div>
</div>

<div class="fixo" onclick="resumo()">Fechar Pedido</div>

<div class="modal" id="modal">
<div class="modal-content" id="conteudo"></div>
</div>

<script>
const produtos = [
{cat:'Tintas',nome:'Balde 18L Econômica',preco:76.90,atacado:71.90,min:20},
{cat:'Massas',nome:'Massa PVA 25kg',preco:38.90,atacado:35.90,min:20},
{cat:'Textura',nome:'Grafiato 25kg',preco:48.90,atacado:45.90,min:20},
{cat:'Acabamento',nome:'Selador 16L',preco:52.90},
{cat:'Complementos',nome:'Impermeabilizante 16L',preco:149.90}
];

let carrinho=[];

function abrir(cat){
let html='<h3>'+cat+'</h3>';
produtos.filter(p=>p.cat==cat).forEach(p=>{
html+=`<div class='prod' onclick="add('${p.nome}',${p.preco},${p.atacado||0},${p.min||0})">${p.nome}<br>R$ ${p.preco}</div>`;
});
html+="<button onclick='fechar()'>Fechar</button>";
document.getElementById('conteudo').innerHTML=html;
document.getElementById('modal').style.display='flex';
}

function fechar(){document.getElementById('modal').style.display='none'}

function add(nome,preco,atacado,min){
let qtd=parseInt(prompt('Quantidade:'));
if(!qtd) return;
let valor=preco;
if(min && qtd<min){alert('Mínimo '+min);return}
if(min && qtd>=min) valor=atacado;
carrinho.push({nome,qtd,valor});
calc();
fechar();
}

function calc(){
let t=0;
carrinho.forEach(i=>t+=i.qtd*i.valor);
document.getElementById('total').innerText=t.toFixed(2);
}

function resumo(){
let html='<h3>Resumo</h3>';
carrinho.forEach(i=>{
html+=`<div>${i.nome} - ${i.qtd} = R$ ${(i.qtd*i.valor).toFixed(2)}</div>`;
});
html+='<hr><button onclick="finalizar()">Finalizar</button>';
document.getElementById('conteudo').innerHTML=html;
document.getElementById('modal').style.display='flex';
}

function finalizar(){
alert('Pedido pronto para WhatsApp ou PDF');
}
</script>

</body>
</html>
