<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.header{background:#0d47a1;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.btn{background:#fff;padding:15px;margin:5px;border-radius:10px;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;width:90%;max-width:400px;border-radius:10px}
.total{font-weight:bold;margin-top:10px}
</style>

</head>

<body>

<div class="header">
<h2>Tintas Qualy Quimy</h2>
<p>Qualidade em Tintas e Complementos</p>
</div>

<div class="container">

<input type="file" onchange="lerExcel(event)">

<div id="categorias" class="grid"></div>

<div class="total">Total: R$ <span id="total">0.00</span></div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let dados = [];
let total = 0;

// LER EXCEL
function lerExcel(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        dados = XLSX.utils.sheet_to_json(sheet);

        carregarCategorias();
    };

    reader.readAsArrayBuffer(file);
}

// CRIAR CATEGORIAS
function carregarCategorias(){
    let cats = [...new Set(dados.map(d => d.Categoria))];

    let html = "";

    cats.forEach(cat=>{
        html += `<div class="btn" onclick="abrirProdutos('${cat}')">${cat}</div>`;
    });

    document.getElementById("categorias").innerHTML = html;
}

// ABRIR PRODUTOS
function abrirProdutos(cat){
    let lista = dados.filter(d => d.Categoria === cat);

    let html = `<h3>${cat}</h3>`;

    lista.forEach((p,i)=>{
        html += `<div class="btn" onclick="abrirProduto(${i})">${p.Produto}</div>`;
    });

    html += `<button onclick="fecharModal()">Voltar</button>`;

    abrirModal(html);
}

// ABRIR PRODUTO
function abrirProduto(i){
    let p = dados[i];

    let html = `
    <h3>${p.Produto}</h3>
    <p>${p.Descrição || ''}</p>
    <p>Preço: R$ ${p.Preço}</p>
    <p>Atacado: R$ ${p.Atacado}</p>
    <p>Mínimo: ${p.Minimo}</p>

    <input type="number" id="qtd" value="${p.Minimo}" min="${p.Minimo}">

    <button onclick="addProduto(${p.Preço}, ${p.Minimo})">Adicionar</button>
    <button onclick="fecharModal()">Voltar</button>
    `;

    abrirModal(html);
}

// ADD
function addProduto(preco, min){
    let qtd = parseInt(document.getElementById("qtd").value);

    if(qtd < min){
        alert("Mínimo não atingido!");
        return;
    }

    total += preco * qtd;
    document.getElementById("total").innerText = total.toFixed(2);

    fecharModal();
}

// MODAL
function abrirModal(html){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = html;
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
