<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tintas Qualy Quimy</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
body {font-family: Arial; margin:0; background:#f4f6f9;}

.header {
    background:#0d47a1;
    color:#fff;
    text-align:center;
    padding:15px;
}

.container {padding:15px;}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.btn {
    background:#fff;
    padding:15px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.total {
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.carrinho {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    max-height:200px;
    overflow:auto;
}

.fechar {
    position:fixed;
    bottom:20px;
    right:20px;
    background:green;
    color:#fff;
    padding:15px;
    border-radius:50px;
    cursor:pointer;
}

.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#fff;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:10px;
}

input {width:100%;padding:10px;margin-bottom:10px;}
</style>
</head>

<body>

<div class="header">
<h2>Tintas Qualy Quimy</h2>
<p>Qualidade em Tintas e Complementos</p>
</div>

<div class="container">

<input type="text" id="vendedor" placeholder="Nome do vendedor">
<input type="text" id="cliente" placeholder="Nome do cliente">

<input type="file" onchange="lerExcel(event)">

<div id="categorias" class="grid"></div>

<div class="carrinho" id="carrinho"></div>

<div class="total">Total: R$ <span id="total">0.00</span></div>

</div>

<div class="fechar" onclick="abrirResumo()">Fechar Pedido</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

let dados = [];
let carrinho = [];
let total = 0;

// LER EXCEL
function lerExcel(e){
    let reader = new FileReader();
    reader.onload = (evt)=>{
        let data = new Uint8Array(evt.target.result);
        let wb = XLSX.read(data,{type:'array'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        dados = XLSX.utils.sheet_to_json(sheet);
        carregarCategorias();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
}

// CATEGORIAS
function carregarCategorias(){
    let cats = [...new Set(dados.map(d=>d.Categoria))];
    let html="";
    cats.forEach(cat=>{
        html += `<div class="btn" onclick="abrirProdutos('${cat}')">${cat}</div>`;
    });
    document.getElementById("categorias").innerHTML = html;
}

// PRODUTOS
function abrirProdutos(cat){
    let lista = dados.filter(d=>d.Categoria===cat);
    let html = `<h3>${cat}</h3>`;

    lista.forEach((p,i)=>{
        html += `<div class="btn" onclick="abrirProduto(${dados.indexOf(p)})">${p.Produto}</div>`;
    });

    html += `<button onclick="fecharModal()">Voltar</button>`;
    abrirModal(html);
}

// PRODUTO DETALHE
function abrirProduto(i){
    let p = dados[i];

    let html = `
    <h3>${p.Produto}</h3>
    <p>${p.Descrição || ''}</p>
    <p>Normal: R$ ${p.Preço}</p>
    <p>Atacado: R$ ${p.Atacado}</p>
    <p>Mínimo: ${p.Minimo}</p>

    <input type="number" id="qtd" value="${p.Minimo}" min="${p.Minimo}">

    <button onclick="addProduto(${i})">Adicionar</button>
    <button onclick="fecharModal()">Voltar</button>
    `;

    abrirModal(html);
}

// ADD PRODUTO
function addProduto(i){
    let p = dados[i];
    let qtd = parseInt(document.getElementById("qtd").value);

    if(qtd < p.Minimo){
        alert("Mínimo não atingido!");
        return;
    }

    let preco = qtd >= p.Minimo ? p.Atacado : p.Preço;

    carrinho.push({nome:p.Produto, qtd, preco});

    atualizarCarrinho();
    fecharModal();
}

// ATUALIZAR CARRINHO
function atualizarCarrinho(){
    let html="";
    total = 0;

    carrinho.forEach(item=>{
        let sub = item.qtd * item.preco;
        total += sub;
        html += `<div>${item.nome} - ${item.qtd} = R$ ${sub.toFixed(2)}</div>`;
    });

    document.getElementById("carrinho").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

// RESUMO + PAGAMENTO
function abrirResumo(){
    let html = `<h3>Pagamento</h3>

    <button onclick="pix()">PIX / Dinheiro (-3%)</button>
    <button onclick="cartao()">Cartão</button>
    <button onclick="cheque()">Cheque</button>

    <button onclick="fecharModal()">Voltar</button>
    `;

    abrirModal(html);
}

function pix(){
    let totalPix = total * 0.97;
    finalizar(totalPix, "PIX");
}

function cartao(){
    let parcela = (total/3).toFixed(2);
    finalizar(total, "Cartão 3x de "+parcela);
}

function cheque(){
    finalizar(total, "Cheque");
}

// FINALIZAR
function finalizar(valor, tipo){
    let msg = `Pedido:\n`;

    carrinho.forEach(i=>{
        msg += `${i.nome} x${i.qtd}\n`;
    });

    msg += `Total: R$ ${valor.toFixed(2)}\nPagamento: ${tipo}`;

    let html = `
    <h3>Finalizado</h3>
    <button onclick="gerarPDF('${msg}')">Gerar PDF</button>
    <button onclick="enviarWhats('${msg}')">WhatsApp</button>
    `;

    abrirModal(html);
}

// PDF
function gerarPDF(msg){
    let doc = new jspdf.jsPDF();
    doc.text(msg,10,10);
    doc.save("pedido.pdf");
}

// WHATS
function enviarWhats(msg){
    let url = "https://wa.me/?text=" + encodeURIComponent(msg);
    window.open(url);
}

// MODAL
function abrirModal(html){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalContent").innerHTML=html;
}

function fecharModal(){
    document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
