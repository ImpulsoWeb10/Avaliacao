<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tintas Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.header {
    text-align: center;
    padding: 15px;
    background: #0d47a1;
    color: white;
}

.sub {
    font-size: 14px;
}

.container {
    padding: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn {
    padding: 15px;
    background: white;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    cursor: pointer;
}

.total {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
}

.fechar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 15px;
    border-radius: 50px;
    cursor: pointer;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background: white;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

.modal button {
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">
    <h2>Tintas Qualy Quimy</h2>
    <div class="sub">Qualidade em Tintas e Complementos</div>
</div>

<div class="container">
    <input placeholder="Nome do vendedor">
    <input placeholder="Nome do cliente">

    <div class="grid">
        <div class="btn" onclick="abrirCategoria('Tintas')">Tintas</div>
        <div class="btn" onclick="abrirCategoria('Textura')">Textura</div>
        <div class="btn" onclick="abrirCategoria('Massas')">Massas</div>
        <div class="btn" onclick="abrirCategoria('Acabamento')">Acabamento</div>
        <div class="btn" onclick="abrirCategoria('Complementos')">Complementos</div>
    </div>

    <div class="total">Total: R$ <span id="total">0.00</span></div>
</div>

<div class="fechar" onclick="fecharPedido()">Fechar</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script>

// SIMULAÇÃO DE PRODUTOS (vamos trocar pelo Excel depois)
const produtos = {
    "Tintas": [
        {nome:"Tinta Branca", preco:50, atacado:45, min:1},
        {nome:"Tinta Azul", preco:60, atacado:55, min:5}
    ]
};

let total = 0;

// ABRIR CATEGORIA
function abrirCategoria(cat){
    let html = `<h3>${cat}</h3>`;

    produtos[cat].forEach((p,i)=>{
        html += `<div class="btn" onclick="abrirProduto('${cat}',${i})">${p.nome}</div>`;
    });

    html += `<button onclick="fecharModal()">Voltar</button>`;

    abrirModal(html);
}

// ABRIR PRODUTO
function abrirProduto(cat,index){
    let p = produtos[cat][index];

    let html = `
    <h3>${p.nome}</h3>
    <p>Preço: R$ ${p.preco}</p>
    <p>Atacado: R$ ${p.atacado}</p>
    <p>Mínimo: ${p.min}</p>

    <input type="number" id="qtd" value="${p.min}" min="${p.min}">

    <button onclick="addProduto(${p.preco}, ${p.min})">Adicionar</button>
    <button onclick="fecharModal()">Voltar</button>
    `;

    abrirModal(html);
}

// ADICIONAR PRODUTO
function addProduto(preco, min){
    let qtd = parseInt(document.getElementById("qtd").value);

    if(qtd < min){
        alert("Quantidade mínima não atingida!");
        return;
    }

    total += preco * qtd;
    document.getElementById("total").innerText = total.toFixed(2);

    fecharModal();
}

// MODAL
function abrirModal(html){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = html;
}

function fecharModal(){
    document.getElementById("modal").style.display = "none";
}

// FECHAR PEDIDO
function fecharPedido(){
    alert("Aqui vai abrir resumo + pagamento (próximo passo)");
}

</script>

</body>
</html>
