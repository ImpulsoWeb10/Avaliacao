<html lang="pt-br">

<title>Tintas Qualy Quimy</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;}
header{text-align:center;padding:15px;background:#020617;}
input{width:90%;padding:10px;margin:5px auto;display:block;border-radius:8px;border:none;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.categoria{background:#1e293b;padding:20px;border-radius:12px;text-align:center;cursor:pointer;}

.carrinho{position:fixed;bottom:0;left:0;width:100%;background:#020617;padding:10px;border-top:2px solid #22c55e;}
.carrinho button{width:100%;padding:12px;border:none;border-radius:8px;background:#22c55e;color:#000;font-weight:bold;}
.total{font-size:18px;font-weight:bold;text-align:center;margin-bottom:5px;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;display:none;justify-content:center;align-items:center;}
.modal-content{background:#fff;color:#000;padding:20px;width:90%;border-radius:12px;max-height:90%;overflow:auto;}

.produto{padding:10px;border-bottom:1px solid #ccc;cursor:pointer;}
.qtd-box{display:flex;justify-content:center;gap:10px;margin:10px 0;}

button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:#22c55e;color:#000;}
.voltar{background:#ccc;}
.remover{background:#ef4444;color:#fff;margin-top:5px;}

</style>
</head>
<body>

<header>
<h2>Tintas Qualy Quimy</h2>
<p style="font-size:12px;opacity:0.7;">Tintas e Texturas</p>
</header>

<input id="vendedor" placeholder="Vendedor">
<input id="cliente" placeholder="Cliente">

<div class="grid">
<div class="categoria" onclick="abrir('tintas')">🎨 Tintas</div>
<div class="categoria" onclick="abrir('massas')">🧱 Massas</div>

</div>

<div class="carrinho">
<div class="total">💰 R$ <span id="total">0.00</span></div>
<button onclick="finalizar()">Fechar Pedido</button>
</div>

<!-- MODAIS -->
<div class="modal" id="modalProdutos"><div class="modal-content" id="lista"></div></div>

<div class="modal" id="modalQtd">
<div class="modal-content">
<h3 id="nome"></h3>
<p id="regras"></p>
<p id="economia" style="color:green;"></p>

<div class="qtd-box">
<button onclick="menos()">-</button>
<input type="number" id="qtd" value="1" style="width:60px;text-align:center;">
<button onclick="mais()">+</button>
</div>

<button onclick="add()">Adicionar</button>
<button class="voltar" onclick="fechar('modalQtd')">Voltar</button>
</div>
</div>

<div class="modal" id="modalFinal">
<div class="modal-content">
<h3>Resumo do Pedido</h3>
<p id="info"></p>
<p id="data"></p>
<div id="resumo"></div>
<h3 id="totalFinal"></h3>

<button onclick="pix()">Pix (-3%)</button>
<div>Cartão em até 3x sem juros</div>
<div id="pagamento"></div>

<div style="background:#e0f2fe;padding:10px;border-radius:8px;margin-top:10px;font-size:13px;">
Pedido mínimo: R$ 1.000<br>
Entrega acima de R$ 500<br>
Prazo: até 7 dias úteis
</div>

<button onclick="enviar()">WhatsApp</button>
<button onclick="window.print()">PDF</button>
<button class="voltar" onclick="fechar('modalFinal')">Voltar</button>
</div>
</div>
