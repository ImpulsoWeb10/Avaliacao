<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tintas Qualy Quimy</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f3f4f6;
}

header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}

.categoria {
    background: white;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
}

.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
}

.modal-content {
    background: white;
    margin: 50px auto;
    padding: 20px;
    width: 90%;
    border-radius: 12px;
}

.produto {
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
}

.qtd {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

button {
    background:#25D366;
    border:none;
    padding:10px;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.carrinho {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111827;
    color: white;
    padding: 10px;
    text-align: center;
}
</style>

</head>
<body>

<header>
<h2>Tintas Qualy Quimy</h2>
<p>Pedido rápido pelo WhatsApp 🚚</p>
</header>

<div class="grid">
<div class="categoria" onclick="abrirCategoria('tintas')">🎨 Tintas</div>
<div class="categoria" onclick="abrirCategoria('massas')">🧱 Massas</div>
<div class="categoria" onclick="abrirCategoria('texturas')">🪵 Texturas</div>
<div class="categoria" onclick="abrirCategoria('prep')">🧴 Preparador</div>
</div>

<!-- MODAL PRODUTOS -->
<div class="modal" id="modalProdutos">
<div class="modal-content" id="listaProdutos"></div>
</div>

<!-- MODAL QUANTIDADE -->
<div class="modal" id="modalQtd">
<div class="modal-content">
<h3 id="nomeProduto"></h3>
<p id="precoProduto"></p>

<div class="qtd">
<button onclick="menos()">-</button>
<input type="number" id="qtd" value="1" style="width:60px;text-align:center;">
<button onclick="mais()">+</button>
</div>

<button onclick="confirmar()">Adicionar ao pedido</button>
</div>
</div>

<div class="carrinho" onclick="enviar()">
🛒 Enviar Pedido
</div>

<script>
let produtos = {
tintas: [
{nome:"Tinta Standard 18L", preco:124.90, atacado:116.90, min:10},
{nome:"Tinta Premium 18L", preco:219.90}
],
massas: [
{nome:"Massa Corrida 25kg", preco:33.90, atacado:31.90, min:20},
{nome:"Massa Acrílica 25kg", preco:43.90}
],
texturas: [
{nome:"Grafiato 25kg", preco:55.90}
],
prep: [
{nome:"Selador Acrílico 18L", preco:69.90}
]
};

let carrinho = [];
let produtoAtual = null;

function abrirCategoria(cat){
let html = "<h3>Escolha o produto</h3>";

produtos[cat].forEach(p=>{
html += `<div class="produto" onclick="selecionarProduto('${p.nome}', ${p.preco}, ${p.atacado || 0}, ${p.min || 0})">
${p.nome}<br>R$ ${p.preco}
</div>`;
});

document.getElementById("listaProdutos").innerHTML = html;
document.getElementById("modalProdutos").style.display = "block";
}

function selecionarProduto(nome, preco, atacado, min){
produtoAtual = {nome, preco, atacado, min};
document.getElementById("modalProdutos").style.display = "none";
document.getElementById("modalQtd").style.display = "block";

document.getElementById("nomeProduto").innerText = nome;
document.getElementById("precoProduto").innerText = "R$ " + preco;
}

function mais(){
let q = document.getElementById("qtd");
q.value = parseInt(q.value) + 1;
}

function menos(){
let q = document.getElementById("qtd");
if(q.value > 1) q.value--;
}

function confirmar(){
let qtd = parseInt(document.getElementById("qtd").value);
let precoFinal = produtoAtual.preco;

if(produtoAtual.atacado && qtd >= produtoAtual.min){
precoFinal = produtoAtual.atacado;
}

carrinho.push({
nome: produtoAtual.nome,
qtd: qtd,
preco: precoFinal
});

document.getElementById("modalQtd").style.display = "none";
document.getElementById("qtd").value = 1;
}

function enviar(){
let texto = "Olá! Quero fazer um pedido:%0A";

carrinho.forEach(p=>{
texto += `- ${p.nome} x${p.qtd} (R$ ${p.preco})%0A`;
});

window.open("https://wa.me/5511954950044?text=" + texto);
}
</script>

</body>
</html>
