<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tintas Qualy Quimy</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.header{background:#0d47a1;color:#fff;text-align:center;padding:15px;}
.container{padding:15px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{background:#fff;padding:15px;border-radius:10px;text-align:center;font-weight:bold;cursor:pointer;}
.total{margin-top:10px;font-size:18px;font-weight:bold;}
.carrinho{background:#fff;padding:10px;border-radius:10px;margin-top:10px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:20px;width:90%;max-width:400px;border-radius:10px;}
.fechar{position:fixed;bottom:20px;right:20px;background:green;color:#fff;padding:15px;border-radius:50px;cursor:pointer;}
input{width:100%;padding:10px;margin-bottom:10px;}
</style>

</head>

<body>

<div class="header">
<h2>Tintas Qualy Quimy</h2>
<p>Qualidade em Tintas e Complementos</p>
</div>

<div class="container">

<div id="categorias" class="grid"></div>

<div class="carrinho" id="carrinho"></div>

<div class="total">Total: R$ <span id="total">0.00</span></div>

</div>

<div class="fechar" onclick="abrirResumo()">Fechar Pedido</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

// BASE DE DADOS
const dados = [
{cat:"Qualy Color Econômica", prod:"Pote 1lt Branca", preco:8.90, atacado:[]},
{cat:"Qualy Color Econômica", prod:"Galão 3,6lts Branca", preco:26.90, atacado:[{q:20,v:23.90}]},
{cat:"Qualy Color Econômica", prod:"Balde 18L Branca", preco:76.90, atacado:[{q:20,v:71.90},{q:100,v:65.99}]},
{cat:"Latex Uso Interno", prod:"Lata 18L Branca", preco:64.90, atacado:[{q:20,v:62.90}]},
{cat:"Standard", prod:"Lata 18L Branca", preco:124.90, atacado:[{q:10,v:116.90}]},
{cat:"Premium", prod:"Balde 16L Branca", preco:190.00, atacado:[]},
{cat:"Piso Premium", prod:"Lata 18L Branca", preco:219.90, atacado:[]},
{cat:"Massa Corrida PVA", prod:"Lata 28kg", preco:55.90, atacado:[{q:30,v:55.90}]},
{cat:"Grafiato", prod:"Barrica 25kg", preco:43.90, atacado:[]},
{cat:"Selador Acrílico", prod:"Galão 3.6L", preco:19.90, atacado:[]},
{cat:"Impermeabilizante", prod:"Balde 16L", preco:149.90, atacado:[]},
{cat:"Esmalte Base Água", prod:"Lata 18L", preco:320.00, atacado:[]}
];

let carrinho = [];
let total = 0;

// CATEGORIAS
function carregarCategorias(){
    let cats = [...new Set(dados.map(d=>d.cat))];
    let html="";
    cats.forEach(c=>{
        html += `<div class="btn" onclick="abrirProdutos('${c}')">${c}</div>`;
    });
    document.getElementById("categorias").innerHTML = html;
}

// PRODUTOS
function abrirProdutos(cat){
    let lista = dados.filter(d=>d.cat===cat);
    let html = `<h3>${cat}</h3>`;

    lista.forEach((p,i)=>{
        html += `<div class="btn" onclick="abrirProduto('${cat}',${i})">${p.prod}</div>`;
    });

    html += `<button onclick="fecharModal()">Voltar</button>`;
    abrirModal(html);
}

// PRODUTO
function abrirProduto(cat,i){
    let p = dados.filter(d=>d.cat===cat)[i];

    let regras = "";
    p.atacado.forEach(a=>{
        regras += `<p>${a.q}+ = R$ ${a.v}</p>`;
    });

    let html = `
    <h3>${p.prod}</h3>
    <p>Preço: R$ ${p.preco}</p>
    ${regras}

    <input type="number" id="qtd" value="1" min="1">

    <button onclick="addProduto('${cat}',${i})">Adicionar</button>
    <button onclick="fecharModal()">Voltar</button>
    `;

    abrirModal(html);
}

// CALCULO INTELIGENTE
function calcularPreco(p, qtd){
    let valor = p.preco;

    p.atacado.forEach(a=>{
        if(qtd >= a.q){
            valor = a.v;
        }
    });

    return valor;
}

// ADD
function addProduto(cat,i){
    let p = dados.filter(d=>d.cat===cat)[i];
    let qtd = parseInt(document.getElementById("qtd").value);

    let precoFinal = calcularPreco(p,qtd);

    carrinho.push({nome:p.prod,qtd,preco:precoFinal});

    atualizarCarrinho();
    fecharModal();
}

// CARRINHO
function atualizarCarrinho(){
    let html="";
    total=0;

    carrinho.forEach(i=>{
        let sub = i.qtd*i.preco;
        total+=sub;
        html += `<div>${i.nome} x${i.qtd} = R$ ${sub.toFixed(2)}</div>`;
    });

    document.getElementById("carrinho").innerHTML = html;
    document.getElementById("total").innerText = total.toFixed(2);
}

// PAGAMENTO
function abrirResumo(){
    let html = `
    <h3>Pagamento</h3>
    <button onclick="pix()">PIX (-3%)</button>
    <button onclick="cartao()">Cartão 3x</button>
    <button onclick="cheque()">Cheque</button>
    `;

    abrirModal(html);
}

function pix(){
    finalizar(total*0.97,"PIX");
}

function cartao(){
    finalizar(total,"Cartão");
}

function cheque(){
    finalizar(total,"Cheque");
}

// FINAL
function finalizar(valor,tipo){
    let msg="Pedido:\n";

    carrinho.forEach(i=>{
        msg+=`${i.nome} x${i.qtd}\n`;
    });

    msg+=`Total: R$ ${valor.toFixed(2)}\n${tipo}`;

    let html=`
    <h3>Finalizado</h3>
    <button onclick="window.open('https://wa.me/?text='+encodeURIComponent('${msg}'))">WhatsApp</button>
    `;

    abrirModal(html);
}

// MODAL
function abrirModal(html){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalContent").innerHTML=html;
}

function fecharModal(){
    document.getElementById("modal").style.display="none";
}

carregarCategorias();

</script>

</body>
</html>
