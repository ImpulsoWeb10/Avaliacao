<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalie Nosso Atendimento ⭐</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(-45deg,#1e1e1e,#2c3e50,#34495e,#1e1e1e);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:rgba(0,0,0,0.45);
padding:35px 25px;
border-radius:25px;
backdrop-filter:blur(12px);
max-width:380px;
width:90%;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.logo{
width:120px;
margin-bottom:20px;
border-radius:12px;
}

h1{
font-size:20px;
margin-bottom:10px;
}

p{
font-size:14px;
margin-bottom:18px;
line-height:1.4em;
}

.estrelas{
font-size:24px;
margin-bottom:18px;
opacity:0.9;
}

/* BOTÕES */
.botao{
display:block;
margin:8px auto;
padding:10px 18px;
width:70%;
font-weight:600;
text-decoration:none;
border-radius:30px;
font-size:14px;
transition:0.3s;
}

/* GOOGLE */
.google{
background:#FFD700;
color:#000;
box-shadow:0 0 10px rgba(255,215,0,0.6);
}

.google:hover{
background:white;
transform:scale(1.05);
}

/* WHATSAPP */
.whatsapp{
background:#25D366;
color:white;
box-shadow:0 0 10px rgba(37,211,102,0.6);
}

.whatsapp:hover{
background:#1ebe5d;
transform:scale(1.05);
}

footer{
margin-top:18px;
padding-top:10px;
font-size:9px;
opacity:0.75;
line-height:1.5;
border-top:1px solid rgba(255,255,255,0.18);
}

footer div{
margin-top:3px;
}

footer a{
color:#00e0ff;
text-decoration:none;
font-weight:600;
text-shadow:0 0 6px rgba(0,224,255,0.6);
}

footer a:hover{
color:#66ecff;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" alt="Logo da Empresa" class="logo">

<h1>Obrigado pela preferência 💛</h1>

<p>Se você gostou do nosso atendimento, deixe sua avaliação e fale conosco sempre que precisar.</p>

<div class="estrelas">
⭐⭐⭐⭐⭐
</div>

<a class="botao google" 
href="#"
target="_blank">
⭐ Avaliar no Google
</a>

<a class="botao whatsapp" 
href="#"
target="_blank">
💬 Falar no WhatsApp
</a>

<footer>

<div>
Qualidade • Confiança • Compromisso
</div>

<div>
🔒 Site Seguro | Certificado SSL
</div>

<div>
⚙️ Desenvolvido por 
<a href="https://wa.me/5511954950044?text=Olá%20vim%20pelo%20site" target="_blank">
ImpulsoWeb10
</a>
</div>

</footer>

</div>

</body>
</html>
