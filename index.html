<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpulsoWeb10 | Hub de Avaliações Google</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .logo-impulso { width: 180px; margin-bottom: 15px; }
        h1 { font-size: 28px; color: #facc15; }
        p { color: #cbd5e1; margin-top: 10px; }

        .grid-clientes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 900px;
            width: 100%;
        }

        .card-cliente {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .card-cliente:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: #facc15;
        }

        .card-cliente i { font-size: 24px; color: #facc15; }
        .info-cliente b { display: block; font-size: 18px; }
        .info-cliente span { font-size: 13px; color: #94a3b8; }

        .cta-vendas {
            margin-top: 50px;
            background: #22c55e;
            padding: 20px 40px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="impulsoweb10.png" alt="ImpulsoWeb10" class="logo-impulso">
        <h1>Nossos Projetos Ativos</h1>
        <p>Soluções inteligentes para indexação e avaliações no Google.</p>
    </div>

    <div class="grid-clientes">
        
        <a href="clientes/esquadriebox/" class="card-cliente">
            <i class="fas fa-tools"></i>
            <div class="info-cliente">
                <b>Esquadri&Box</b>
                <span>Esquadrias e Vidros Temperados</span>
            </div>
        </a>

        <a href="clientes/amorporpatinhas/" class="card-cliente">
            <i class="fas fa-paw"></i>
            <div class="info-cliente">
                <b>Amor por Patinhas</b>
                <span>Clínica Veterinária Popular</span>
            </div>
        </a>
        <a href="clientes/QualyQuimy/" class="card-cliente">
            <i class="fas fa-flask"></i> <div class="info">
                <b>QualyQuimy</b>
                <span>Tintas Massas e Texturas</span>
            </div>
        </a>
        <a href="clientes/analiliamcake/" class="card-cliente">
            <i class="fas fa-birthday-cake"></i>
            <div class="info">
                <b>Ana Liliam Cake</b>
                <span>Bolos e Doces Artesanais</span>
            </div>
        </a>
        </div>

    <a href="https://wa.me/5511954950044?text=Quero%20um%20link%20de%20avaliacoes%20profissional" class="cta-vendas">
        <i class="fab fa-whatsapp"></i> QUERO UM LINK ASSIM
    </a>

</body>
</html>
