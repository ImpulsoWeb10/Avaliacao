<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Regional - Final</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 180px; }
        .header { background: #1a2a3a; color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 10; }
        .data-txt { font-size: 0.75em; color: #f1c40f; text-transform: uppercase; }
        .container { padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-item { background: white; border: 1px solid #ddd; padding: 20px 10px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #333; }
        .btn-item:active { background: #e8f0fe; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .seletor { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .btn-c { width: 60px; height: 60px; border: none; border-radius: 12px; font-size: 2em; color: white; font-weight: bold; }
        .mais { background: #27ae60; } .menos { background: #e74c3c; }
        .confirmar { background: #27ae60; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2em; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #1a2a3a; color: white; padding: 15px; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; font-size: 0.8em; margin-bottom: 10px; border-bottom: 1px solid #334; padding-bottom: 8px; }
        .total-g { display: flex; justify-content: space-between; font-size: 1.3em; font-weight: bold; color: #f1c40f; margin-bottom: 10px; }
        .acoes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-resumo { background: #f1c40f; color: #1a2a3a; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-limpar { background: #c0392b; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #tela-inst { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="data-txt" id="data-atual">14 de Março, 2026</div>
        <div style="font-size: 1.1em;">Ensaio Regional Aracaré</div>
    </div>

    <div id="tela-comum" class="container">
        <h3 style="text-align: center; color: #555;">1. Qual Comum?</h3>
        <div class="grid" id="lista-comuns"></div>
    </div>

    <div id="tela-inst" class="container">
        <h3 style="text-align: center; color: #555;"><span id="label-comum-v"></span></h3>
        <div class="grid" id="lista-instrumentos"></div>
        <button onclick="voltar()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:8px; background:#ddd;">← Voltar</button>
    </div>

    <div id="modal-global" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo">Qtd</h2>
            <div class="seletor">
                <button class="btn-c menos" onclick="mudarQtd(-1)">-</button>
                <span id="valor-modal" style="font-size: 3.5em; font-weight: bold;">1</span>
                <button class="btn-c mais" onclick="mudarQtd(1)">+</button>
            </div>
            <button class="confirmar" onclick="confirmarStep()">CONFIRMAR</button>
        </div>
    </div>

    <div class="footer">
        <div class="stats">
            <div>CORDAS: <span id="rCordas">0</span></div>
            <div>MADEIRAS: <span id="rMadeiras">0</span></div>
            <div>METAIS: <span id="rMetais">0</span></div>
        </div>
        <div class="total-g">
            <span>TOTAL GERAL:</span>
            <span id="rTotal">0</span>
        </div>
        <div class="acoes">
            <button class="btn-resumo" onclick="gerarResumo()">FINALIZAR / RESUMO</button>
            <button class="btn-limpar" onclick="limparTudo()">ZERAR</button>
        </div>
    </div>

<script>
    const comuns = [
        "Jardim Adriane", "Água das Pedras", "Jardim Amazonas", "Aracaré", "Vila Arizona", 
        "Jardim Caiuby", "Jardim Canaã", "Jardim do Carmo", "Jardim Carolina", "Central", 
        "Cidade Nova Louzada", "Jardim Estancia Guatambú", "Parque Residencial Furtuna", "Vila Japão", 
        "Jardim Itapuã", "Jardim Itaquá", "Jardim Josely", "Jardim Karine", "Jardim Marcelo", 
        "Parque Macedo", "Parque Marengo", "Parque Residencial Marengo", "Jardim Maria Eliza", 
        "Jardim Maria Rosa", "Monte Belo", "Jardim Miray", "Jardim Monica", "Jardim Moraes", 
        "Sítio José de Moraes", "Morro Branco", "Vila Nely", "Parque Novo Horizonte", "Jardim Odete", 
        "Jardim Paineira", "Jardim Patricia", "Pedreira", "Jardim Pinheirinho", "Parque Piratininga I", 
        "Parque Piratininga II", "Pium", "Rancho Grande", "Vila São Carlos", "Parque São Pedro", 
        "Jardim São Paulo", "Scaffid", "Jardim Silvestre", "Vila Sônia", "Terra Prometida", 
        "Jardim Tropical", "Parque Village", "Vila Virginia"
    ];

    const instrumentos = [
        {n: "Organistas", t: "cordas"}, {n: "Violino", t: "cordas"}, {n: "Viola", t: "cordas"}, {n: "Violoncelo", t: "cordas"},
        {n: "Flauta", t: "madeiras"}, {n: "Clarinete", t: "madeiras"}, {n: "Sax Alto", t: "madeiras"}, {n: "Sax Tenor", t: "madeiras"},
        {n: "Trompete", t: "metais"}, {n: "Trompa", t: "metais"}, {n: "Trombone", t: "metais"}, {n: "Tuba", t: "metais"}, {n: "Eufônio", t: "metais"}
    ];

    let step = "comum", tempComum = "", tempInst = "", tempTipo = "", qtdModal = 1;
    let totais = JSON.parse(localStorage.getItem('totais_ensaio')) || { cordas: 0, madeiras: 0, metais: 0 };

    function init() {
        const divC = document.getElementById('lista-comuns');
        comuns.forEach(c => {
            let b = document.createElement('button'); b.className = 'btn-item'; b.innerText = c;
            b.onclick = () => { tempComum = c; openModal("comum"); };
            divC.appendChild(b);
        });
        const divI = document.getElementById('lista-instrumentos');
        instrumentos.forEach(i => {
            let b = document.createElement('button'); b.className = 'btn-item'; b.innerText = i.n;
            b.onclick = () => { tempInst = i.n; tempTipo = i.t; openModal("inst"); };
            divI.appendChild(b);
        });
        atualizarRodape();
    }

    function openModal(tipo) {
        step = tipo; qtdModal = 1;
        document.getElementById('valor-modal').innerText = "1";
        document.getElementById('modal-titulo').innerText = tipo === "comum" ? tempComum : tempInst;
        document.getElementById('modal-global').style.display = 'flex';
    }

    function mudarQtd(v) { qtdModal = Math.max(1, qtdModal + v); document.getElementById('valor-modal').innerText = qtdModal; }

    function confirmarStep() {
        document.getElementById('modal-global').style.display = 'none';
        if(step === "comum") {
            document.getElementById('tela-comum').style.display = 'none';
            document.getElementById('tela-inst').style.display = 'block';
            document.getElementById('label-comum-v').innerText = tempComum;
            window.scrollTo(0,0);
        } else {
            totais[tempTipo] += qtdModal;
            localStorage.setItem('totais_ensaio', JSON.stringify(totais));
            atualizarRodape();
            voltar();
        }
    }

    function voltar() {
        document.getElementById('tela-comum').style.display = 'block';
        document.getElementById('tela-inst').style.display = 'none';
        window.scrollTo(0,0);
    }

    function atualizarRodape() {
        document.getElementById('rCordas').innerText = totais.cordas;
        document.getElementById('rMadeiras').innerText = totais.madeiras;
        document.getElementById('rMetais').innerText = totais.metais;
        document.getElementById('rTotal').innerText = totais.cordas + totais.madeiras + totais.metais;
    }

    function gerarResumo() {
        let total = totais.cordas + totais.madeiras + totais.metais;
        if(total === 0) return alert("Nenhum músico contado ainda.");
        let texto = `*RELATÓRIO ENSAIO REGIONAL*\n📍 Aracaré - ${new Date().toLocaleDateString()}\n\n`;
        texto += `🎻 Cordas: ${totais.cordas}\n🎷 Madeiras: ${totais.madeiras}\n🎺 Metais: ${totais.metais}\n`;
        texto += `\n*TOTAL GERAL: ${total} Músicos*`;
        
        if (navigator.share) {
            navigator.share({ title: 'Resumo Ensaio', text: texto });
        } else {
            alert(texto); // Para PC ou navegadores antigos
        }
    }

    function limparTudo() {
        if(confirm("Deseja ZERAR toda a contagem e começar de novo?")) {
            totais = { cordas: 0, madeiras: 0, metais: 0 };
            localStorage.removeItem('totais_ensaio');
            atualizarRodape();
        }
    }

    init();
</script>
</body>
</html>
