<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Ensaio Regional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        
        .header-principal { background: #1a2a3a; color: white; text-align: center; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .data-titulo { font-size: 0.8em; color: #f1c40f; text-transform: uppercase; letter-spacing: 1px; }

        /* TELA 1: COMUNS */
        #tela-comuns { padding: 15px; text-align: center; }
        .grid-comuns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-comum { background: white; border: 1px solid #ced4da; padding: 18px 5px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #2c3e50; }

        /* TELA 2: INSTRUMENTOS */
        #tela-instrumentos { display: none; padding: 10px; }
        .btn-inst { background: white; display: block; width: 100%; margin-bottom: 6px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; text-align: left; font-weight: 600; font-size: 1.1em; color: #34495e; }

        /* MODAL DE QUANTIDADE */
        #modal-qtd { 
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center; 
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .seletor { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 25px 0; }
        .btn-c { width: 60px; height: 60px; border: none; border-radius: 12px; font-size: 2em; color: white; font-weight: bold; }
        .mais { background: #27ae60; }
        .menos { background: #e74c3c; }
        .btn-confirmar { background: #27ae60; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2em; }
        .btn-voltar { background: #eee; color: #666; width: 100%; padding: 12px; border: none; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header-principal">
        <div class="data-titulo" id="data-atual"></div>
        <div style="font-size: 1.2em; font-weight: bold;">Ensaio Regional Aracaré</div>
    </div>

    <div id="tela-comuns">
        <p style="color: #666; font-weight: bold;">Selecione a Comum:</p>
        <div class="grid-comuns" id="lista-comuns"></div>
    </div>

    <div id="tela-instrumentos">
        <p style="text-align:center; font-weight:bold; color:#1a2a3a;">Comum: <span id="label-comum" style="color:#2980b9;"></span></p>
        <p style="text-align:center; color:#666; font-size:0.9em;">Qual instrumento?</p>
        <div id="lista-inst"></div>
        <button class="btn-voltar" onclick="irParaComuns()">← Voltar para Comuns</button>
    </div>

    <div id="modal-qtd">
        <div class="modal-content">
            <div id="resumo-selecao" style="font-weight: bold; color: #7f8c8d; font-size: 0.9em;"></div>
            <h2 id="inst-selecionado" style="margin: 10px 0; color: #1a2a3a;">Instrumento</h2>
            <div class="seletor">
                <button class="btn-c menos" onclick="alterarQtd(-1)">-</button>
                <span id="valor-qtd" style="font-size: 3em; font-weight: bold;">1</span>
                <button class="btn-c mais" onclick="alterarQtd(1)">+</button>
            </div>
            <button class="btn-confirmar" onclick="finalizar()">CONFIRMAR E SALVAR</button>
            <button class="btn-voltar" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

<script>
    // Data Automática no topo
    const opcoes = { day: '2-digit', month: 'long', year: 'numeric' };
    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', opcoes);

    const comuns = [
        "Jardim Adriane", "Água das Pedras", "Jardim Amazonas", "Aracaré", "Vila Arizona", 
        "Jardim Caiuby", "Jardim Canaã", "Jardim do Carmo", "Jardim Carolina", "Central", 
        "Cidade Nova Louzada", "Jardim Estancia Guatambú", "Parque Residencial Furtuna", "Vila Japão", 
        "Jardim Itapuã", "Jardim Itaquá", "Jardim Josely", "Jardim Karine", "Jardim Marcelo", 
        "Parque Macedo", "Parque Marengo", "Parque Residencial Marengo", "Jardim Maria Eliza", 
        "Jardim Maria Rosa", "Monte Belo", "Jardim Miray", "Jardim Monica", "Jardim Moraes", 
        "Sítio José de Moraes", "Morro Branco", "Vila Nely", "Parque Novo Horizonte", "Jardim Odete", 
        "Jardim Paineira", "Jardim Patricia", "Pedreira", "Jardim Pinheirinho", "Parque Piratininga I", 
        "Parque Piratininga II", "Pium", "Rancho Grande", "Vila São Carlos", "Parque São Pedro", 
        "Jardim São Paulo", "Scaffid", "Jardim Silvestre", "Vila Sônia", "Terra Prometida", 
        "Jardim Tropical", "Parque Village", "Vila Virginia"
    ];

    const instrumentos = ["Organistas", "Violino", "Viola", "Violoncelo", "Flauta", "Oboé", "Clarinete", "Sax Alto", "Sax Tenor", "Trompete", "Trompa", "Trombone", "Tuba", "Eufônio"];

    let comumEscolhida = "";
    let instEscolhido = "";
    let qtdAtual = 1;

    // Gerar Botões Comuns
    const divComuns = document.getElementById('lista-comuns');
    comuns.forEach(c => {
        let b = document.createElement('button');
        b.className = 'btn-comum';
        b.innerText = c;
        b.onclick = () => { comumEscolhida = c; irParaInst(); };
        divComuns.appendChild(b);
    });

    // Gerar Botões Instrumentos
    const divInst = document.getElementById('lista-inst');
    instrumentos.forEach(i => {
        let b = document.createElement('button');
        b.className = 'btn-inst';
        b.innerText = i;
        b.onclick = () => abrirModal(i);
        divInst.appendChild(b);
    });

    function irParaInst() {
        document.getElementById('label-comum').innerText = comumEscolhida;
        document.getElementById('tela-comuns').style.display = 'none';
        document.getElementById('tela-instrumentos').style.display = 'block';
        window.scrollTo(0,0);
    }

    function irParaComuns() {
        document.getElementById('tela-comuns').style.display = 'block';
        document.getElementById('tela-instrumentos').style.display = 'none';
    }

    function abrirModal(inst) {
        instEscolhido = inst;
        qtdAtual = 1;
        document.getElementById('resumo-selecao').innerText = comumEscolhida;
        document.getElementById('inst-selecionado').innerText = inst;
        document.getElementById('valor-qtd').innerText = "1";
        document.getElementById('modal-qtd').style.display = 'flex';
    }

    function alterarQtd(v) {
        qtdAtual = Math.max(1, qtdAtual + v);
        document.getElementById('valor-qtd').innerText = qtdAtual;
    }

    function fecharModal() {
        document.getElementById('modal-qtd').style.display = 'none';
    }

    function finalizar() {
        // Aqui você pode integrar com seu banco de dados no futuro
        alert(`Registrado: ${qtdAtual} ${instEscolhido}(s) de ${comumEscolhida}`);
        
        // RESET TOTAL PARA NOVA CONTAGEM
        fecharModal();
        irParaComuns();
    }
</script>

</body>
</html>
