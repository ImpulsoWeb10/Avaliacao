<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem Ensaio Regional</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .secao { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .secao-titulo { font-weight: bold; margin-bottom: 10px; color: #2980b9; display: block; text-transform: uppercase; font-size: 0.9em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { display: flex; flex-direction: column; }
        label { font-size: 0.85em; margin-bottom: 3px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; } /* 16px evita zoom no iPhone */
        
        .dashboard { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; position: sticky; bottom: 10px; margin-top: 20px; }
        .dash-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.1em; }
        .total-geral { border-top: 1px solid #555; padding-top: 10px; margin-top: 10px; font-weight: bold; font-size: 1.4em; color: #f1c40f; }
        .stats { font-size: 0.8em; color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <h2>Contagem Regional</h2>

    <div class="secao">
        <span class="secao-titulo">Família das Cordas</span>
        <div class="grid">
            <div class="item"><label>Organistas</label><input type="number" class="cordas" value="0" oninput="calcular()"></div>
            <div class="item"><label>Violinos</label><input type="number" class="cordas" value="0" oninput="calcular()"></div>
            <div class="item"><label>Violas</label><input type="number" class="cordas" value="0" oninput="calcular()"></div>
            <div class="item"><label>Violoncelos</label><input type="number" class="cordas" value="0" oninput="calcular()"></div>
        </div>
    </div>

    <div class="secao">
        <span class="secao-titulo">Família das Madeiras</span>
        <div class="grid">
            <div class="item"><label>Flautas</label><input type="number" class="madeiras" value="0" oninput="calcular()"></div>
            <div class="item"><label>Clarinetes</label><input type="number" class="madeiras" value="0" oninput="calcular()"></div>
            <div class="item"><label>Saxofones</label><input type="number" class="madeiras" value="0" oninput="calcular()"></div>
            <div class="item"><label>Fagote/Oboé</label><input type="number" class="madeiras" value="0" oninput="calcular()"></div>
        </div>
    </div>

    <div class="secao">
        <span class="secao-titulo">Família dos Metais</span>
        <div class="grid">
            <div class="item"><label>Trompetes</label><input type="number" class="metais" value="0" oninput="calcular()"></div>
            <div class="item"><label>Trombones</label><input type="number" class="metais" value="0" oninput="calcular()"></div>
            <div class="item"><label>Tubas</label><input type="number" class="metais" value="0" oninput="calcular()"></div>
            <div class="item"><label>Eufônios</label><input type="number" class="metais" value="0" oninput="calcular()"></div>
        </div>
    </div>

    <div class="secao">
        <span class="secao-titulo">Ministério</span>
        <div class="grid">
            <div class="item"><label>Anciães</label><input type="number" class="ministerio" value="0" oninput="calcular()"></div>
            <div class="item"><label>Diáconos</label><input type="number" class="ministerio" value="0" oninput="calcular()"></div>
            <div class="item"><label>Cooperadores</label><input type="number" class="ministerio" value="0" oninput="calcular()"></div>
        </div>
    </div>

    <div class="dashboard">
        <div class="dash-line"><span>Músicos:</span> <span id="resMusicos">0</span></div>
        <div class="stats">
            Cordas: <span id="pCordas">0</span>% | 
            Madeiras: <span id="pMadeiras">0</span>% | 
            Metais: <span id="pMetais">0</span>%
        </div>
        <div class="dash-line"><span>Ministério/Outros:</span> <span id="resMinisterio">0</span></div>
        <div class="dash-line total-geral"><span>TOTAL GERAL:</span> <span id="resTotal">0</span></div>
    </div>
</div>

<script>
function calcular() {
    let cordas = somarClasse('cordas');
    let madeiras = somarClasse('madeiras');
    let metais = somarClasse('metais');
    let ministerio = somarClasse('ministerio');

    let totalMusicos = cordas + madeiras + metais;
    let totalGeral = totalMusicos + ministerio;

    // Atualiza números
    document.getElementById('resMusicos').innerText = totalMusicos;
    document.getElementById('resMinisterio').innerText = ministerio;
    document.getElementById('resTotal').innerText = totalGeral;

    // Atualiza Porcentagens
    if(totalMusicos > 0) {
        document.getElementById('pCordas').innerText = Math.round((cordas / totalMusicos) * 100);
        document.getElementById('pMadeiras').innerText = Math.round((madeiras / totalMusicos) * 100);
        document.getElementById('pMetais').innerText = Math.round((metais / totalMusicos) * 100);
    }
}

function somarClasse(nomeClasse) {
    let inputs = document.getElementsByClassName(nomeClasse);
    let soma = 0;
    for (let i = 0; i < inputs.length; i++) {
        soma += Number(inputs[i].value) || 0;
    }
    return soma;
}
</script>

</body>
</html>
